o==="evaluacion"||p.tipo==="abierta")&&<textarea style={{...S.ta,minHeight:60}} placeholder="Tu respuesta..." value={resps[i]||""} onChange={e=>setR(i,e.target.value)}/>}</div>))}</div>);}

    const generarAct=async()=>{if(!tipo||!area||!grado){setErr("Selecciona tipo, área y grado");return;}setGenIA(true);setErr("");try{const r=await fetch(`${API}/generar-actividad`,{method:"POST",headers:authH(),body:JSON.stringify({tipo,tema:titulo||"Tema general",area,grado,cantidad:5})});const d=await r.json();if(d.ok)setActividad(d.actividad);}catch(_){setErr("Error generando");}setGenIA(false);};

    return(<div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onCerrar()}><div style={S.modal}><div style={S.mHead}><div><h2 style={{color:C.azulC,margin:0,fontFamily:FT,fontSize:16}}>📋 Asignar tarea</h2><p style={{color:C.textoS,margin:"3px 0 0",fontSize:11}}>Paso {paso} de 2</p></div><button style={{...S.btnSm,fontSize:16}} onClick={onCerrar}>✕</button></div>
    <div style={S.mBody}>{paso===1&&(<><p style={{color:C.texto,fontWeight:"bold",marginBottom:8,fontFamily:FT,fontSize:13}}>Tipo de actividad</p><div style={{...S.grid3,marginBottom:14}}>{TIPOS_ACT.map(t=>(<div key={t.id} style={S.opcion(tipo===t.id)} onClick={()=>setTipo(t.id)}><p style={{...S.oLbl,fontSize:11}}>{t.label}</p></div>))}</div><div style={{marginBottom:10}}><p style={S.lbl}>Título *</p><input style={S.inp} placeholder="Ej: Quiz sobre ecosistemas" value={titulo} onChange={e=>setTitulo(e.target.value)}/></div><div style={{marginBottom:10}}><p style={S.lbl}>Instrucciones</p><textarea style={{...S.ta,minHeight:60}} placeholder="Instrucciones..." value={desc} onChange={e=>setDesc(e.target.value)}/></div><div style={{...S.fila,marginBottom:12}}><div style={{flex:1}}><p style={S.lbl}>Área</p><select style={S.sel} value={area} onChange={e=>setArea(e.target.value)}><option value="">Seleccionar</option>{["Ciencias Naturales","Ciencias Sociales","Matemáticas","Lengua Castellana","Inglés","Educación Física","Artística","Ética","Tecnología","Filosofía","Química","Física","Biología"].map(m=><option key={m}>{m}</option>)}</select></div><div style={{flex:1}}><p style={S.lbl}>Grado</p><select style={S.sel} value={grado} onChange={e=>setGrado(e.target.value)}><option value="">Seleccionar</option>{TODOS_GRADOS.map(g=><option key={g}>{g}</option>)}</select></div><div style={{flex:1}}><p style={S.lbl}>Fecha entrega</p><input type="date" style={S.inp} value={fecha} onChange={e=>setFecha(e.target.value)}/></div></div><div style={{background:"#0f2a47",border:`1px solid ${C.azul}`,borderRadius:8,padding:12}}><p style={{color:C.azulC,fontWeight:"bold",margin:"0 0 8px",fontSize:12}}>🤖 Generar preguntas con IA</p><button style={{...S.btnA,opacity:genIA?0.7:1}} disabled={genIA} onClick={generarAct}>{genIA?"⏳ Generando...":"✨ Generar preguntas automáticas"}</button>{actividad&&<div style={{marginTop:8,background:"#0a1128",borderRadius:6,padding:8}}><p style={{color:C.ok,fontWeight:"bold",margin:"0 0 4px",fontSize:11}}>✅ {(actividad.preguntas||actividad.pares||[]).length} preguntas</p></div>}</div></>)}
    {paso===2&&(<><p style={{color:C.texto,fontWeight:"bold",marginBottom:10,fontFamily:FT,fontSize:13}}>¿Cómo asignar?</p><div style={{...S.fila,marginBottom:14}}><div style={{...S.opcion(modo==="grado"),flex:1}} onClick={()=>{setModo("grado");setSelIds([]);setEsts([]);setGradoSel("");}}><p style={S.oLbl}>🎓 Grado completo</p><p style={S.oDesc}>Todos los del grado</p></div><div style={{...S.opcion(modo==="individual"),flex:1}} onClick={()=>{setModo("individual");setGradoSel("");}}><p style={S.oLbl}>👤 Individual</p><p style={S.oDesc}>Estudiante por estudiante</p></div></div>
    {modo==="grado"&&(<><p style={S.lbl}>Selecciona el grado</p><div style={{...S.grid3,marginBottom:12}}>{GRADOS.map(g=>(<div key={g} style={{...S.opcion(gradoSel===g),padding:"8px 6px",textAlign:"center"}} onClick={()=>{setGradoSel(g);cargarEsts(g);}}><p style={{...S.oLbl,textAlign:"center",fontSize:11}}>Grado {g}</p></div>))}</div>{gradoSel&&<div style={{background:"#052e16",border:`1px solid ${C.ok}`,borderRadius:6,padding:"8px 12px"}}>{cargEsts?<p style={{color:C.textoS,margin:0,fontSize:12}}>Cargando...</p>:<p style={{color:C.ok,margin:0,fontSize:12,fontWeight:"bold"}}>✅ {ests.length} estudiantes en grado {gradoSel}</p>}</div>}</>)}
    {modo==="individual"&&(<><p style={{color:C.textoS,fontSize:11,margin:"0 0 6px"}}>Cargar por grado:</p><div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{GRADOS.map(g=>(<button key={g} style={{...S.btnSm,color:gradoSel===g?C.azulC:C.textoS,borderColor:gradoSel===g?C.azul:C.borde,fontSize:10}} onClick={()=>{setGradoSel(g);setBusq("");cargarEsts(g);}}>Grado {g}</button>))}</div><input style={{...S.inp,marginBottom:8}} placeholder="🔍 Buscar..." value={busq} onChange={e=>setBusq(e.target.value)}/>{filtEsts.length>0&&(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><p style={{color:C.textoS,fontSize:11,margin:0}}>{filtEsts.length} estudiantes · <span style={{color:C.ok}}>{selIds.length} seleccionados</span></p><div style={{display:"flex",gap:5}}><button style={{...S.btnSm,fontSize:10,color:C.azulC,borderColor:C.azul}} onClick={()=>setSelIds(filtEsts.map(e=>e.id))}>Todos</button><button style={{...S.btnSm,fontSize:10,color:C.err,borderColor:C.rojo}} onClick={()=>setSelIds([])}>Limpiar</button></div></div>)}{cargEsts?<p style={{color:C.textoS,textAlign:"center",padding:12,fontSize:12}}>Cargando...</p>:filtEsts.length===0?(<div style={{background:"#0a1128",borderRadius:6,padding:16,textAlign:"center",border:`1px solid ${C.borde}`}}><p style={{color:C.textoS,fontSize:12,margin:0}}>{gradoSel?"No hay estudiantes.":"Selecciona un grado."}</p></div>):(<div style={{maxHeight:240,overflowY:"auto",background:"#0a1128",borderRadius:6,border:`1px solid ${C.borde}`,padding:5}}>{filtEsts.map(e=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,marginBottom:2,background:selIds.includes(e.id)?"#0f2a47":"transparent",border:selIds.includes(e.id)?`1px solid ${C.azul}`:"1px solid transparent",cursor:"pointer"}} onClick={()=>toggleEst(e.id)}><div style={{width:18,height:18,borderRadius:4,flexShrink:0,border:selIds.includes(e.id)?`2px solid ${C.azulC}`:`2px solid ${C.borde}`,background:selIds.includes(e.id)?C.azul:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{selIds.includes(e.id)&&<span style={{color:"white",fontSize:11,fontWeight:"bold"}}>✓</span>}</div><div><p style={{color:selIds.includes(e.id)?C.azulC:C.texto,margin:0,fontSize:12,fontWeight:selIds.includes(e.id)?"bold":"normal"}}>{e.name}</p><p style={{color:C.textoS,fontSize:10,margin:0}}>Grado {e.grade} · @{e.username}</p></div></div>))}</div>)}{selIds.length>0&&<div style={{marginTop:6,background:"#052e16",border:`1px solid ${C.ok}`,borderRadius:6,padding:"6px 10px"}}><p style={{color:C.ok,fontSize:11,margin:0}}>✅ {selIds.length} seleccionado{selIds.length!==1?"s":""}</p></div>}</>)}</>)}
    {err&&<p style={{...S.err,marginTop:10}}>{err}</p>}</div>
    <div style={S.mFoot}>{paso===1?(<><button style={S.btnG} onClick={onCerrar}>Cancelar</button><button style={{...S.btnV,flex:1}} onClick={()=>{if(!titulo){setErr("Completa el título");return;}setErr("");setPaso(2);}}>Siguiente →</button></>):(<><button style={{...S.btnG,width:"auto",padding:"10px 16px"}} onClick={()=>setPaso(1)}>← Volver</button><button style={{...S.btnV,flex:1,opacity:creando?0.7:1}} disabled={creando} onClick={crear}>{creando?"⏳ Creando...":"✅ Crear y asignar"}</button></>)}</div>
    </div></div>);}

    // ── Modal Crear/Editar Estudiante ─────────────────────
    function ModalEstudiante({ estudiante, instituciones, docentes, onCerrar, onGuardado }) {
      const editando = !!estudiante;
      const [nombre, setNombre] = useState(estudiante?.name || "");
      const [usuario, setUsuario] = useState(estudiante?.username || "");
      const [password, setPassword] = useState("");
      const [grado, setGrado] = useState(estudiante?.grade || "");
      const [instId, setInstId] = useState(estudiante?.institutionId || "");
      const [docsSelIds, setDocsSelIds] = useState(estudiante?.docentes?.map(d=>d.id) || []);
      const [guardando, setGuardando] = useState(false);
      const [err, setErr] = useState("");
      const toggleDoc = id => setDocsSelIds(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
      const guardar = async () => {
        if (!nombre || !usuario || (!editando && !password) || !instId) { setErr("Completa nombre, usuario, contraseña e institución"); return; }
        setGuardando(true); setErr("");
        try {
          const url = editando ? `${API}/superadmin/students/${estudiante.id}` : `${API}/superadmin/students`;
          const method = editando ? "PUT" : "POST";
          const body = { nombre, usuario, grado, institutionId: instId, teacherIds: docsSelIds };
          if (password) body.password = password;
          const r = await fetch(url, { method, headers: authH(), body: JSON.stringify(body) });
          const d = await r.json();
          if (r.ok) onGuardado(d.estudiante, d.mensaje);
          else setErr(d.mensaje || "Error");
        } catch { setErr("Error de conexión"); }
        setGuardando(false);
      };
      const docsInst = docentes.filter(d => d.institutionId === instId);
      return (
        <div style={SA.saOverlay} onClick={e=>e.target===e.currentTarget&&onCerrar()}>
          <div style={SA.saModal}>
            <div style={SA.saMHead}><h3 style={{color:C.azulC,margin:0,fontSize:16}}>{editando?"✏️ Editar estudiante":"➕ Crear estudiante"}</h3><button style={{...S.btnSm,fontSize:16}} onClick={onCerrar}>✕</button></div>
            <div style={SA.saMBody}>
              <div><p style={S.lbl}>Nombre completo *</p><input style={SA.saInp} value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Juan Pérez"/></div>
              <div style={S.fila}>
                <div style={{flex:1}}><p style={S.lbl}>Usuario * (sin espacios)</p><input style={SA.saInp} value={usuario} onChange={e=>setUsuario(e.target.value.toLowerCase().replace(/\s+/g,""))} placeholder="juanperez"/></div>
                <div style={{flex:1}}><p style={S.lbl}>{editando?"Nueva contraseña (opcional)":"Contraseña *"}</p><input type="password" style={SA.saInp} value={password} onChange={e=>setPassword(e.target.value)} placeholder={editando?"Dejar vacío para no cambiar":"••••••"}/></div>
              </div>
              <div style={S.fila}>
                <div style={{flex:1}}><p style={S.lbl}>Grado</p><select style={SA.saSel} value={grado} onChange={e=>setGrado(e.target.value)}><option value="">Sin grado</option>{TODOS_GRADOS.map(g=><option key={g}>{g}</option>)}</select></div>
                <div style={{flex:1}}><p style={S.lbl}>Institución *</p><select style={SA.saSel} value={instId} onChange={e=>{setInstId(e.target.value);setDocsSelIds([]);}}><option value="">Seleccionar</option>{instituciones.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select></div>
              </div>
              {instId && (
                <div>
                  <p style={S.lbl}>Asignar docentes ({docsInst.length} disponibles)</p>
                  {docsInst.length === 0 ? <p style={{color:C.textoS,fontSize:12}}>No hay docentes en esta institución.</p> : (
                    <div style={{maxHeight:160,overflowY:"auto",background:"#0a1128",borderRadius:7,border:`1px solid ${C.borde}`,padding:6}}>
                      {docsInst.map(d=>(
                        <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,cursor:"pointer",background:docsSelIds.includes(d.id)?"#0f2a47":"transparent"}} onClick={()=>toggleDoc(d.id)}>
                          <div style={{width:16,height:16,borderRadius:3,border:docsSelIds.includes(d.id)?`2px solid ${C.azulC}`:`2px solid ${C.borde}`,background:docsSelIds.includes(d.id)?C.azul:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{docsSelIds.includes(d.id)&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                          <span style={{fontSize:12,color:docsSelIds.includes(d.id)?C.azulC:C.texto}}>{d.name}</span>
                          <span style={{fontSize:10,color:C.textoS,marginLeft:"auto"}}>{d.cargo}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
              {err && <p style={S.err}>{err}</p>}
            </div>
            <div style={SA.saMFoot}><button style={SA.saBtnG} onClick={onCerrar}>Cancelar</button><button style={{...SA.saBtnV,opacity:guardando?0.7:1}} disabled={guardando} onClick={guardar}>{guardando?"Guardando...":"💾 Guardar"}</button></div>
          </div>
        </div>
      );
    }

    // ── Modal Asignación Rápida por Grado ─────────────────
    function ModalAsignacionGrado({ instituciones, docentes, onCerrar, onDone }) {
      const [instId, setInstId] = useState("");
      const [grado, setGrado] = useState("");
      const [docenteId, setDocenteId] = useState("");
      const [cargando, setCargando] = useState(false);
      const [msg, setMsg] = useState("");
      const asignar = async () => {
        if (!instId || !grado || !docenteId) { setMsg("Completa todos los campos"); return; }
        setCargando(true); setMsg("");
        try {
          const r = await fetch(`${API}/superadmin/assign/teacher-batch`, { method:"POST", headers:authH(), body:JSON.stringify({ teacherId:docenteId, institutionId:instId, grade:grado }) });
          const d = await r.json();
          setMsg(d.mensaje || "Listo");
          if (r.ok) setTimeout(() => onDone(), 1500);
        } catch { setMsg("Error de conexión"); }
        setCargando(false);
      };
      const docsInst = docentes.filter(d => d.institutionId === instId);
      return (
        <div style={SA.saOverlay} onClick={e=>e.target===e.currentTarget&&onCerrar()}>
          <div style={{...SA.saModal,maxWidth:420}}>
            <div style={SA.saMHead}><h3 style={{color:C.naranja,margin:0,fontSize:16}}>⚡ Asignación masiva por grado</h3><button style={{...S.btnSm,fontSize:16}} onClick={onCerrar}>✕</button></div>
            <div style={SA.saMBody}>
              <p style={{color:C.textoS,fontSize:13,margin:0}}>Asigna un docente a todos los estudiantes de un grado en una institución.</p>
              <div><p style={S.lbl}>Institución</p><select style={SA.saSel} value={instId} onChange={e=>{setInstId(e.target.value);setDocenteId("");}}><option value="">Seleccionar</option>{instituciones.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select></div>
              <div style={S.fila}>
                <div style={{flex:1}}><p style={S.lbl}>Grado</p><select style={SA.saSel} value={grado} onChange={e=>setGrado(e.target.value)}><option value="">Seleccionar</option>{TODOS_GRADOS.map(g=><option key={g}>{g}</option>)}</select></div>
                <div style={{flex:1}}><p style={S.lbl}>Docente</p><select style={SA.saSel} value={docenteId} onChange={e=>setDocenteId(e.target.value)} disabled={!instId}><option value="">Seleccionar</option>{docsInst.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
              </div>
              {msg && <p style={msg.includes("✅")?S.ok_msg:S.err}>{msg}</p>}
            </div>
            <div style={SA.saMFoot}><button style={SA.saBtnG} onClick={onCerrar}>Cancelar</button><button style={{...SA.saBtnN,opacity:cargando?0.7:1}} disabled={cargando} onClick={asignar}>{cargando?"Asignando...":"⚡ Asignar docente al grado"}</button></div>
          </div>
        </div>
      );
    }

    // ── Panel principal Super Admin ───────────────────────
    function SuperAdmin({ usuario, onSalir }) {
      const [seccion, setSeccion] = useState("dashboard");
      const [stats, setStats] = useState({});
      const [instituciones, setInstituciones] = useState([]);
      const [docentes, setDocentes] = useState([]);
      const [estudiantes, setEstudiantes] = useState([]);
      const [cargando, setCargando] = useState(false);
      const [msg, setMsg] = useState({ texto:"", tipo:"" });
      const [filtroInst, setFiltroInst] = useState("");
      const [filtroGrado, setFiltroGrado] = useState("");
      const [filtroDoc, setFiltroDoc] = useState("");
      const [busqueda, setBusqueda] = useState("");
      const [selIds, setSelIds] = useState([]);
      const [modalEst, setModalEst] = useState(null);
      const [modalGrado, setModalGrado] = useState(false);
      const [modalCambioGrado, setModalCambioGrado] = useState(false);
      const [nuevoGrado, setNuevoGrado] = useState("");

      const mostrarMsg = (texto, tipo="ok") => { setMsg({ texto, tipo }); setTimeout(() => setMsg({ texto:"", tipo:"" }), 3000); };

      const cargarStats = useCallback(async () => { try { const r=await fetch(`${API}/superadmin/stats`,{headers:authH()}); const d=await r.json(); setStats(d); } catch(_){} }, []);
      const cargarInstituciones = useCallback(async () => { try { const r=await fetch(`${API}/superadmin/institutions`,{headers:authH()}); const d=await r.json(); setInstituciones(d.instituciones||[]); } catch(_){} }, []);
      const cargarDocentes = useCallback(async () => { try { const r=await fetch(`${API}/superadmin/teachers`,{headers:authH()}); const d=await r.json(); setDocentes(d.docentes||[]); } catch(_){} }, []);
      const cargarEstudiantes = useCallback(async () => {
        setCargando(true);
        try {
          const params = new URLSearchParams();
          if (filtroInst) params.append("institutionId", filtroInst);
          if (filtroGrado) params.append("grade", filtroGrado);
          if (filtroDoc) params.append("teacherId", filtroDoc);
          if (busqueda) params.append("search", busqueda);
          const r = await fetch(`${API}/superadmin/students?${params}`, { headers: authH() });
          const d = await r.json();
          setEstudiantes(d.estudiantes||[]);
        } catch(_){}
        setCargando(false);
      }, [filtroInst, filtroGrado, filtroDoc, busqueda]);

      useEffect(() => { cargarStats(); cargarInstituciones(); cargarDocentes(); }, []);
      useEffect(() => { if (seccion === "estudiantes") cargarEstudiantes(); }, [seccion, cargarEstudiantes]);

      const eliminarEstudiante = async id => {
        if (!window.confirm("¿Eliminar este estudiante? Esta acción no se puede deshacer.")) return;
        try {
          const r = await fetch(`${API}/superadmin/students/${id}`, { method:"DELETE", headers:authH() });
          const d = await r.json();
          if (r.ok) { mostrarMsg(d.mensaje); cargarEstudiantes(); cargarStats(); }
          else mostrarMsg(d.mensaje, "err");
        } catch { mostrarMsg("Error al eliminar", "err"); }
      };

      const cambiarGradoMasivo = async () => {
        if (!nuevoGrado || selIds.length === 0) return;
        try {
          const r = await fetch(`${API}/superadmin/assign/grade`, { method:"POST", headers:authH(), body:JSON.stringify({ studentIds:selIds, grade:nuevoGrado }) });
          const d = await r.json();
          if (r.ok) { mostrarMsg(d.mensaje); setSelIds([]); setModalCambioGrado(false); setNuevoGrado(""); cargarEstudiantes(); }
          else mostrarMsg(d.mensaje, "err");
        } catch { mostrarMsg("Error", "err"); }
      };

      const toggleSel = id => setSelIds(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
      const toggleTodos = () => setSelIds(selIds.length === estudiantes.length ? [] : estudiantes.map(e=>e.id));

      const SECCIONES = [
        { id:"dashboard", icon:"📊", label:"Dashboard" },
        { id:"estudiantes", icon:"👨‍🎓", label:"Estudiantes" },
        { id:"docentes", icon:"👨‍🏫", label:"Docentes" },
        { id:"instituciones", icon:"🏫", label:"Instituciones" },
      ];

      return (
        <div style={SA.fondo}>
          <div style={SA.sidebar}>
            <div style={SA.sLogo}>
              <p style={{color:C.azulC,fontWeight:"bold",margin:0,fontSize:14}}>🛡️ Super Admin</p>
              <p style={{color:C.textoS,margin:"3px 0 0",fontSize:11}}>{usuario?.name}</p>
            </div>
            {SECCIONES.map(s=>(<div key={s.id} style={SA.sItem(seccion===s.id)} onClick={()=>setSeccion(s.id)}><span>{s.icon}</span><span>{s.label}</span></div>))}
            <div style={{marginTop:"auto",padding:"14px 20px",borderTop:`1px solid ${C.borde}`}}>
              <button style={{...S.btnSm,width:"100%",color:C.err,borderColor:C.rojo,padding:"7px 0"}} onClick={onSalir}>← Salir del panel</button>
            </div>
          </div>
          <div style={SA.main}>
            {msg.texto && (<div style={{background:msg.tipo==="ok"?"#052e16":"#2d0a0a",border:`1px solid ${msg.tipo==="ok"?C.ok:C.err}`,borderRadius:8,padding:"10px 16px",marginBottom:16}}><p style={{color:msg.tipo==="ok"?C.ok:C.err,margin:0,fontSize:13,fontWeight:"bold"}}>{msg.texto}</p></div>)}

            {seccion==="dashboard"&&(<>
              <div style={SA.saHeader}><h1 style={SA.titulo}>📊 Dashboard General</h1></div>

r:C.naranja,borderColor:C.naranja,fontSize:10}} onClick={()=>{setCalId(e.entregaId);setCalNota(e.calificacion||"");setCalComent(e.comentario||"");}}>{e.calificacion!=null?"✏️":"📝 Cal."}</button>}</td></tr>))}</tbody></table></div>)}</div></div></div>);
      if(vista==="perfil")return(<div style={S.fondo}><Header/><div style={S.cont}><div style={S.bloque}><button style={{...S.btnSm,marginBottom:14}} onClick={()=>setVista("dashboard")}>← Volver</button><h2 style={S.tBloque}>⚙️ Mi perfil</h2><div style={{display:"flex",gap:32,justifyContent:"center",marginBottom:20}}><SubirImg label="🏫 Escudo" preview={logoPreview} inputRef={logoRef} onChange={e=>{const f=e.target.files[0];if(f){setLogoFile(f);setLogoPreview(URL.createObjectURL(f));}}}/><SubirImg label="🚩 Bandera" preview={banderaPreview} inputRef={banderaRef} onChange={e=>{const f=e.target.files[0];if(f){setBanderaFile(f);setBanderaPreview(URL.createObjectURL(f));}}}/></div><div style={S.sep}/><div style={{...S.fila,marginBottom:10}}><div style={{flex:1}}><p style={S.lbl}>Cargo</p><select style={S.sel} value={usuario?.cargo||"Docente"} onChange={e=>setUsuario({...usuario,cargo:e.target.value})}>{["Docente","Coordinador/a","Rector/a","Orientador/a"].map(c=><option key={c}>{c}</option>)}</select></div></div><button style={{...S.btnV,width:"auto",padding:"10px 20px"}} onClick={subirPerfil}>💾 Guardar</button></div></div></div>);
      if(vista==="historial")return(<div style={S.fondo}><Header/><div style={S.cont}><div style={S.bloque}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={S.tBloque}>📂 Mis clases</h2><button style={{...S.btnV,width:"auto",padding:"8px 14px"}} onClick={()=>{reset();setVista("ia");}}>+ Nueva</button></div>{misClases.length===0?<p style={{color:C.textoS,textAlign:"center",padding:24,fontSize:13}}>Sin clases guardadas.</p>:misClases.map(c=>(<TarjetaClase key={c.id} clase={c} onVer={async cl=>{const r=await fetch(`${API}/clase/${cl.id}`,{headers:authH()});const d=await r.json();setClaseActiva(d.clase);setVista("verClase");}} onEliminar={eliminarClase}/>))}</div></div></div>);
      if(vista==="verClase"&&claseActiva)return(<div style={S.fondo}><Header/><div style={S.cont}><button style={{...S.btnSm,marginBottom:12}} onClick={()=>setVista("historial")}>← Volver</button><div style={{background:C.tarjeta,padding:20,borderRadius:12,border:`1px solid ${C.borde}`}}><h2 style={{color:C.azulC,fontSize:17,marginBottom:3,marginTop:0,fontFamily:FT}}>{claseActiva.datos?.tema}</h2><p style={{color:C.textoS,fontSize:12,marginBottom:16}}>{claseActiva.datos?.area} · Grado {claseActiva.datos?.grado}</p><div style={S.sep}/><pre style={S.pre}>{claseActiva.contenido}</pre></div></div></div>);

      const PASOS=["Nivel","Datos","Apertura","Desarrollo","Retroalim.","Cierre","Resultado"];
      return(<div style={S.fondo}><Header/><div style={S.cont}>{paso<7&&(<div style={{display:"flex",gap:4,marginBottom:20,justifyContent:"center",flexWrap:"wrap"}}>{PASOS.map((p,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:3}}><div style={S.pasoBola(paso===i+1,paso>i+1)}>{paso>i+1?"✓":i+1}</div><span style={{color:paso===i+1?C.azulC:"#4a5a70",fontSize:10}}>{p}</span>{i<PASOS.length-1&&<span style={{color:C.borde,margin:"0 1px",fontSize:12}}>›</span>}</div>))}</div>)}
      {paso===1&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setVista("dashboard")}>← Inicio</button><h2 style={S.tBloque}>🎓 Nivel educativo</h2><div style={S.grid2}>{[{id:"preescolar",label:"🌱 Preescolar",desc:"Transición"},{id:"primaria",label:"🏫 Primaria",desc:"Grados 1° a 5°"},{id:"bachillerato",label:"📚 Bachillerato",desc:"Grados 6° a 11°"},{id:"media_tecnica",label:"🔧 Media Técnica",desc:"Grados 10° y 11°"}].map(n=>(<div key={n.id} style={S.opcion(nivelEdu===n.id)} onClick={()=>setNivelEdu(n.id)}><p style={S.oLbl}>{n.label}</p><p style={S.oDesc}>{n.desc}</p></div>))}</div><button style={{...S.btnV,marginTop:16}} onClick={()=>{if(!nivelEdu){alert("Selecciona el nivel");return;}setPaso(2);}}>Continuar →</button></div>)}
      {paso===2&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setPaso(1)}>← Volver</button><h2 style={S.tBloque}>📋 Información de la clase</h2><div style={{...S.fila,marginBottom:8}}><div style={{flex:2}}><p style={S.lbl}>Institución</p><input style={S.inp} value={institucion} onChange={e=>setInstitucion(e.target.value)}/></div></div><div style={{...S.fila,marginBottom:8}}><div style={{flex:2}}><p style={S.lbl}>Docente</p><input style={S.inp} value={docente} onChange={e=>setDocente(e.target.value)}/></div><div style={{flex:1}}><p style={S.lbl}>Periodo</p><select style={S.sel} value={periodo} onChange={e=>setPeriodo(e.target.value)}>{["1","2","3","4"].map(p=><option key={p}>Periodo {p}</option>)}</select></div></div><div style={{...S.fila,marginBottom:8}}><div style={{flex:1}}><p style={S.lbl}>Área</p><select style={S.sel} value={area} onChange={e=>setArea(e.target.value)}><option value="">Seleccionar</option>{["Ciencias Naturales","Ciencias Sociales","Matemáticas","Lengua Castellana","Inglés","Educación Física","Artística","Ética y Valores","Tecnología e Informática","Filosofía","Química","Física","Biología"].map(m=><option key={m}>{m}</option>)}</select></div><div style={{flex:1}}><p style={S.lbl}>Grado</p><select style={S.sel} value={grado} onChange={e=>setGrado(e.target.value)}><option value="">Seleccionar</option>{(nivelEdu==="preescolar"?["Transición"]:nivelEdu==="primaria"?["1°","2°","3°","4°","5°"]:nivelEdu==="media_tecnica"?["10°","11°"]:["6°","7°","8°","9°","10°","11°"]).map(g=><option key={g}>{g}</option>)}</select></div></div><div style={{...S.fila,marginBottom:8}}><div style={{flex:2}}><p style={S.lbl}>Tema</p><input style={S.inp} placeholder="Ej: El verbo to be" value={tema} onChange={e=>setTema(e.target.value)}/></div><div style={{flex:1}}><p style={S.lbl}>Duración</p><select style={S.sel} value={duracion} onChange={e=>setDuracion(e.target.value)}>{OPT_DUR.map(d=><option key={d.v} value={d.v}>{d.l}</option>)}</select></div></div><div style={{marginBottom:16}}><p style={S.lbl}>Fecha</p><input type="date" style={{...S.inp,width:"auto"}} value={fecha} onChange={e=>setFecha(e.target.value)}/></div><button style={S.btnV} onClick={()=>{if(!area||!grado||!tema){alert("Completa área, grado y tema");return;}setPaso(3);}}>Continuar →</button></div>)}
      {paso===3&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setPaso(2)}>← Volver</button><h2 style={S.tBloque}>🚀 ¿Cómo iniciar la clase?</h2><Opcs lista={optAper} val={apertura} set={setApertura}/><button style={{...S.btnV,marginTop:16}} onClick={()=>{if(!apertura){alert("Selecciona apertura");return;}setPaso(4);}}>Continuar →</button></div>)}
      {paso===4&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setPaso(3)}>← Volver</button><h2 style={S.tBloque}>⚙️ ¿Cómo desarrollar el contenido?</h2><Opcs lista={optDes} val={desarrollo} set={setDesarrollo}/><button style={{...S.btnV,marginTop:16}} onClick={()=>{if(!desarrollo){alert("Selecciona estrategia");return;}setPaso(5);}}>Continuar →</button></div>)}
      {paso===5&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setPaso(4)}>← Volver</button><h2 style={S.tBloque}>🔄 ¿Cómo verificar el aprendizaje?</h2><Opcs lista={optRet} val={retro} set={setRetro}/><button style={{...S.btnV,marginTop:16}} onClick={()=>{if(!retro){alert("Selecciona estrategia");return;}setPaso(6);}}>Continuar →</button></div>)}
      {paso===6&&(<div style={S.bloque}><button style={{...S.btnSm,marginBottom:10}} onClick={()=>setPaso(5)}>← Volver</button><h2 style={S.tBloque}>🏁 Cierre y tarea</h2><p style={{color:C.texto,fontWeight:"bold",marginBottom:8,fontFamily:FT,fontSize:13}}>Estrategia de cierre</p><Opcs lista={OPT_CIERRE} val={cierre} set={setCierre}/><div style={S.sep}/><p style={{color:C.texto,fontWeight:"bold",marginBottom:8,fontFamily:FT,fontSize:13}}>¿Dejar tarea?</p><div style={{...S.fila,marginBottom:12}}><div style={{...S.opcion(dejaTarea===true),flex:1}} onClick={()=>setDejaTarea(true)}><p style={S.oLbl}>✅ Sí</p></div><div style={{...S.opcion(dejaTarea===false),flex:1}} onClick={()=>{setDejaTarea(false);setTarea("");}}><p style={S.oLbl}>❌ No</p></div></div>{dejaTarea===true&&<Opcs lista={OPT_TAREA} val={tarea} set={setTarea}/>}<button style={{...S.btnV,marginTop:16,opacity:cargando?0.7:1}} disabled={cargando} onClick={()=>{if(!cierre){alert("Selecciona cierre");return;}if(dejaTarea===null){alert("Indica si hay tarea");return;}if(dejaTarea&&!tarea){alert("Selecciona tipo de tarea");return;}generarGuia();}}>{cargando?"⏳ Generando guía...":"✨ Generar guía completa"}</button></div>)}
      {paso===7&&(<div>{!cargando&&contenido&&!contenido.startsWith("❌")&&(<><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}><span style={S.chip}>📚 {area}</span><span style={S.chip}>🎓 {grado}</span><span style={S.chip}>⏱️ {OPT_DUR.find(d=>d.v===duracion)?.l}</span></div><div style={{...S.fila,marginBottom:16,flexWrap:"wrap",gap:6}}><button style={{...S.btnA,width:"auto",padding:"9px 14px"}} onClick={()=>exportar("word")} disabled={descWord}>{descWord?"⏳...":"📥 Word"}</button><button style={{...S.btnN,width:"auto",padding:"9px 14px"}} onClick={()=>exportar("pdf")} disabled={descPdf}>{descPdf?"⏳...":"📄 PDF"}</button>{!guardadoOk?<button style={{...S.btnV,width:"auto",padding:"9px 14px",opacity:guardando?0.7:1}} onClick={guardarClase} disabled={guardando}>{guardando?"💾...":"💾 Guardar"}</button>:<span style={{...S.chip,background:"#052e16",borderColor:C.ok,color:C.ok,padding:"9px 12px"}}>✅ Guardada</span>}<button style={{...S.btnG,width:"auto"}} onClick={()=>setVista("dashboard")}>🏠</button><button style={{...S.btnG,width:"auto"}} onClick={reset}>+ Nueva</button></div></>)}{cargando&&<div style={{background:C.tarjeta,padding:44,borderRadius:12,border:`1px solid ${C.borde}`,textAlign:"center"}}><p style={{fontSize:36,margin:"0 0 10px"}}>✨</p><p style={{color:C.azulC,fontSize:16,fontFamily:FT}}>Generando tu guía...</p></div>}{!cargando&&contenido&&(<div style={{background:C.tarjeta,padding:20,borderRadius:12,border:`1px solid ${C.borde}`}}><h2 style={{color:C.azulC,fontSize:16,marginBottom:3,marginTop:0,fontFamily:FT}}>📄 {tema}</h2><p style={{color:C.textoS,fontSize:11,marginBottom:16}}>{area} · {grado}</p><div style={S.sep}/><pre style={S.pre}>{contenido}</pre></div>)}</div>)}
      </div></div>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
