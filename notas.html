<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libro de Notas · EduPanel IESS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0e1420;color:#F1F5F9;font-family:"Segoe UI",Arial,sans-serif}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
    .back-btn{
      position:fixed;top:10px;left:10px;z-index:9999;
      padding:6px 12px;border-radius:6px;
      background:rgba(21,101,192,.25);border:1px solid #1565C0;
      color:#60A5FA;font-size:.72rem;cursor:pointer;
      text-decoration:none;font-family:"Segoe UI",sans-serif;transition:all .15s
    }
    .back-btn:hover{background:#1565C0;color:#fff}
  </style>
</head>
<body>
  <a href="/edupanel/login.html" class="back-btn">&#8592; Volver a EduPanel</a>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const {useState, useEffect, useRef} = React;
    const API = "https://educlass-backend-4kk0.onrender.com";
    const FC = "'Segoe UI',Arial,sans-serif";
    const FT = "Georgia,'Times New Roman',serif";
    const C = {
      fondo:"#0e1420", panel:"#0a1128", tarjeta:"#111827",
      borde:"#1e2d45", azul:"#2563EB", azulC:"#60A5FA",
      verde:"#059669", verdeC:"#34D399", texto:"#F1F5F9",
      textoS:"#64748B", err:"#F87171", ok:"#4ADE80",
      naranja:"#F59E0B", rojo:"#DC2626"
    };
    const S = {
      fondo:{minHeight:"100vh",background:C.fondo,fontFamily:FC,color:C.texto},
      pantalla:{
        minHeight:"100vh",background:C.fondo,
        display:"flex",justifyContent:"center",alignItems:"center",
        fontFamily:FC,padding:16
      },
      card:{
        background:C.tarjeta,padding:"32px 28px",borderRadius:16,
        width:"100%",maxWidth:420,display:"flex",flexDirection:"column",
        gap:14,boxShadow:"0 12px 40px rgba(0,0,0,0.6)",
        border:"1px solid "+C.borde
      },
      header:{
        background:C.panel,padding:"0 24px",height:56,
        display:"flex",justifyContent:"space-between",alignItems:"center",
        borderBottom:"2px solid "+C.azul,
        position:"sticky",top:0,zIndex:100
      },
      cont:{maxWidth:980,margin:"0 auto",padding:"24px 16px"},
      bloque:{
        background:C.tarjeta,padding:20,borderRadius:12,
        marginBottom:14,border:"1px solid "+C.borde
      },
      tBloque:{
        color:C.azulC,fontSize:17,marginBottom:8,marginTop:0,
        fontFamily:FT,fontWeight:"bold"
      },
      lbl:{color:C.textoS,fontSize:12,marginBottom:4,fontWeight:"500"},
      inp:{
        padding:"10px 13px",borderRadius:8,border:"1px solid "+C.borde,
        background:"#0a1128",color:C.texto,fontSize:13,width:"100%",
        boxSizing:"border-box",fontFamily:FC,outline:"none"
      },
      sel:{
        padding:"10px 13px",borderRadius:8,border:"1px solid "+C.borde,
        background:"#0a1128",color:C.texto,fontSize:13,flex:1,
        fontFamily:FC,outline:"none"
      },
      btnA:{
        padding:"11px 18px",borderRadius:8,border:"none",
        background:"linear-gradient(135deg,"+C.azul+",#1d4ed8)",
        color:"#fff",fontWeight:"700",fontSize:13,cursor:"pointer",
        width:"100%",fontFamily:FT
      },
      btnG:{
        padding:"10px 18px",borderRadius:8,border:"1px solid "+C.borde,
        background:"transparent",color:C.textoS,fontSize:13,
        cursor:"pointer",fontFamily:FC
      },
      btnV:{
        padding:"11px 18px",borderRadius:8,border:"none",
        background:"linear-gradient(135deg,"+C.verde+",#047857)",
        color:"#fff",fontWeight:"700",fontSize:13,cursor:"pointer",
        width:"100%",fontFamily:FT
      },
      btnSm:{
        padding:"5px 11px",borderRadius:6,border:"1px solid "+C.borde,
        background:"transparent",color:C.textoS,cursor:"pointer",fontSize:11
      },
      fila:{display:"flex",gap:10},
      sep:{borderTop:"1px solid "+C.borde,margin:"14px 0"},
      err:{color:C.err,textAlign:"center",margin:0,fontSize:12},
      ok_msg:{color:C.ok,textAlign:"center",margin:0,fontSize:12},
      overlay:{
        position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",
        zIndex:200,display:"flex",alignItems:"center",
        justifyContent:"center",padding:16
      },
      modal:{
        background:C.tarjeta,borderRadius:14,border:"1px solid "+C.borde,
        width:"100%",maxWidth:500,maxHeight:"90vh",
        display:"flex",flexDirection:"column",overflow:"hidden"
      },
      mHead:{
        padding:"18px 22px 14px",borderBottom:"1px solid "+C.borde,
        display:"flex",justifyContent:"space-between",alignItems:"center"
      },
      mBody:{padding:"18px 22px",overflowY:"auto",flex:1},
      mFoot:{
        padding:"14px 22px",borderTop:"1px solid "+C.borde,
        display:"flex",gap:8
      }
    };

    const authH = () => ({
      "Content-Type":"application/json",
      "Authorization":"Bearer "+(localStorage.getItem("edutoken")||"")
    });

    const GRADOS = ["6°","7°","8°","9°","10°","11°"];
    const AREAS = [
      "Agropecuaria","Artes","Cátedra Ambiental","Ciencias Naturales","Ciencias Sociales",
      "Ecopolítica","Educación Física","Emprendimiento","Español","Estadística",
      "Ética y Valores","Filosofía","Física","Geometría","Inglés",
      "Lectura Crítica","Matemáticas","Proyecto Artes","Proyecto Ciencia",
      "Proyecto Deporte","Química","Religión","Tecnología e Informática"
    ];

    function Login({onLogin}) {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);
      const login = async () => {
        if (!email) { setMsg("Ingresa tu correo"); return; }
        setLoading(true);
        try {
          const r = await fetch(API+"/auth/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({email, password})
          });
          const d = await r.json();
          if (r.ok) {
            localStorage.setItem("edutoken", d.token);
            localStorage.setItem("educlass_usuario", JSON.stringify(d.usuario));
            onLogin(d.usuario);
          } else {
            setMsg(d.mensaje||"Error al ingresar");
          }
        } catch(_) { setMsg("Sin conexion al servidor"); }
        setLoading(false);
      };
      return (
        <div style={S.pantalla}>
          <div style={S.card}>
            <div style={{textAlign:"center"}}>
              <span style={{fontSize:44}}>📊</span>
              <h1 style={{
                color:C.azulC,fontSize:20,fontWeight:"bold",
                margin:"8px 0 4px",fontFamily:FT
              }}>Libro de Notas</h1>
              <p style={{color:C.textoS,fontSize:13}}>EduPanel IESS</p>
            </div>
            <div>
              <p style={S.lbl}>Correo docente</p>
              <input style={S.inp}
                placeholder="docente@colegio.edu.co"
                value={email}
                onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&login()}/>
            </div>
            <div>
              <p style={S.lbl}>Contrasena</p>
              <input type="password" style={S.inp}
                placeholder="••••••••"
                value={password}
                onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&login()}/>
            </div>
            <button style={{...S.btnA,opacity:loading?0.7:1}}
              disabled={loading}
              onClick={login}>
              {loading?"Ingresando...":"Ingresar"}
            </button>
            {msg && <p style={S.err}>{msg}</p>}
          </div>
        </div>
      );
    }

    function ModalNuevoPeriodo({onCerrar, onCreado}) {
      const [nombre, setNombre] = useState("");
      const [area, setArea] = useState("");
      const [grado, setGrado] = useState("");
      const [porcentaje, setPorcentaje] = useState(100);
      const [cantAct, setCantAct] = useState(3);
      const [nombresAct, setNombresAct] = useState([]);
      const [guardando, setGuardando] = useState(false);
      const [err, setErr] = useState("");

      const crear = async () => {
        if (!nombre||!area||!grado) { setErr("Completa todos los campos"); return; }
        setGuardando(true); setErr("");
        const acts = nombresAct.length
          ? nombresAct
          : Array.from({length:cantAct}, (_,i) => "Actividad "+(i+1));
        try {
          const r = await fetch(API+"/notas/periodos", {
            method:"POST", headers:authH(),
            body:JSON.stringify({
              nombre, area, grado,
              porcentaje:Number(porcentaje),
              actividades:acts
            })
          });
          const d = await r.json();
          if (r.ok) onCreado(d.periodo);
          else setErr(d.mensaje||"Error");
        } catch(_) { setErr("Error de conexion"); }
        setGuardando(false);
      };

      return (
        <div style={S.overlay}
          onClick={e=>e.target===e.currentTarget&&onCerrar()}>
          <div style={S.modal}>
            <div style={S.mHead}>
              <h3 style={{color:C.verdeC,margin:0,fontSize:15}}>
                Nuevo periodo de notas
              </h3>
              <button style={{...S.btnSm,fontSize:16}} onClick={onCerrar}>x</button>
            </div>
            <div style={S.mBody}>
              <div style={{marginBottom:10}}>
                <p style={S.lbl}>Nombre del periodo *</p>
                <input style={S.inp}
                  placeholder="Ej: Primer Periodo 2026"
                  value={nombre}
                  onChange={e=>setNombre(e.target.value)}/>
              </div>
              <div style={{...S.fila,marginBottom:10}}>
                <div style={{flex:1}}>
                  <p style={S.lbl}>Area *</p>
                  <select style={S.sel} value={area}
                    onChange={e=>setArea(e.target.value)}>
                    <option value="">Seleccionar</option>
                    {AREAS.map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <p style={S.lbl}>Grado *</p>
                  <select style={S.sel} value={grado}
                    onChange={e=>setGrado(e.target.value)}>
                    <option value="">Seleccionar</option>
                    {GRADOS.map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
              </div>
              <div style={{...S.fila,marginBottom:10}}>
                <div style={{flex:1}}>
                  <p style={S.lbl}>Porcentaje del ano (%)</p>
                  <input style={S.inp} type="number" min="1" max="100"
                    value={porcentaje}
                    onChange={e=>setPorcentaje(e.target.value)}/>
                </div>
                <div style={{flex:1}}>
                  <p style={S.lbl}>Num. actividades</p>
                  <input style={S.inp} type="number" min="1" max="10"
                    value={cantAct}
                    onChange={e=>{
                      const n=parseInt(e.target.value)||1;
                      setCantAct(n);
                      setNombresAct(
                        Array.from({length:n},(_,i)=>
                          nombresAct[i]||("Actividad "+(i+1)))
                      );
                    }}/>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <p style={{...S.lbl,marginBottom:6}}>Nombres de actividades</p>
                {Array.from({length:cantAct},(_,i)=>(
                  <input key={i} style={{...S.inp,marginBottom:5}}
                    placeholder={"Actividad "+(i+1)}
                    value={nombresAct[i]||""}
                    onChange={e=>{
                      const a=[...nombresAct];
                      a[i]=e.target.value;
                      setNombresAct(a);
                    }}/>
                ))}
              </div>
              <div style={{
                background:"rgba(34,197,94,.08)",
                border:"1px solid rgba(34,197,94,.2)",
                borderRadius:6,padding:10,fontSize:11,color:C.textoS
              }}>
                El porcentaje indica cuanto vale este periodo del ano.
                Las notas van de 0 a 5 y se promedian automaticamente.
              </div>
              {err && <p style={{...S.err,marginTop:8}}>{err}</p>}
            </div>
            <div style={S.mFoot}>
              <button style={S.btnG} onClick={onCerrar}>Cancelar</button>
              <button style={{
                ...S.btnV,flex:1,opacity:guardando?0.7:1
              }} disabled={guardando} onClick={crear}>
                {guardando?"Creando...":"Crear periodo"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function VistaPeriodo({periodo, onVolver, onGuardado}) {
      const [estudiantes, setEstudiantes] = useState([]);
      const [notas, setNotas] = useState(periodo.notas||{});
      const [guardando, setGuardando] = useState(false);
      const [cargando, setCargando] = useState(true);
      const [busq, setBusq] = useState("");

      useEffect(() => {
        fetch(API+"/students/grado/"+encodeURIComponent(periodo.grado), {
          headers:authH()
        }).then(r=>r.json())
          .then(d=>{ setEstudiantes(d.estudiantes||[]); setCargando(false); })
          .catch(()=>setCargando(false));
      }, []);

      const guardar = async () => {
        setGuardando(true);
        try {
          const r = await fetch(API+"/notas/periodos/"+periodo.id, {
            method:"PUT", headers:authH(),
            body:JSON.stringify({notas})
          });
          const d = await r.json();
          if (r.ok) {
            alert("Notas guardadas");
            onGuardado({...periodo, notas});
          } else alert(d.mensaje);
        } catch(_) { alert("Error guardando"); }
        setGuardando(false);
      };

      const calcProm = (notasEst) => {
        if (!notasEst) return null;
        const vals = Object.values(notasEst)
          .map(v=>parseFloat(v)).filter(v=>!isNaN(v));
        return vals.length
          ? parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2))
          : null;
      };

      const estFiltrados = estudiantes.filter(e =>
        e.name.toLowerCase().includes(busq.toLowerCase())
      );

      const totalConNota = Object.values(notas)
        .filter(n=>Object.values(n).some(v=>v!=="")).length;
      const promsValidos = Object.values(notas)
        .map(n=>calcProm(n)).filter(p=>p!==null);
      const promGrupal = promsValidos.length
        ? parseFloat((promsValidos.reduce((a,b)=>a+b,0)/promsValidos.length).toFixed(2))
        : null;

      return (
        <div style={S.fondo}>
          <div style={S.header}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button style={{...S.btnSm,color:C.azulC,borderColor:C.azul}}
                onClick={onVolver}>
                Volver
              </button>
              <div>
                <p style={{
                  color:C.texto,fontWeight:"bold",margin:0,fontSize:14
                }}>{periodo.nombre}</p>
                <p style={{color:C.textoS,margin:0,fontSize:11}}>
                  {periodo.area} - Grado {periodo.grado} - {periodo.porcentaje}%
                </p>
              </div>
            </div>
            <button style={{
              ...S.btnV,width:"auto",padding:"8px 18px",
              opacity:guardando?0.7:1
            }} disabled={guardando} onClick={guardar}>
              {guardando?"Guardando...":"Guardar notas"}
            </button>
          </div>
          <div style={S.cont}>
            <div style={{
              display:"grid",gridTemplateColumns:"repeat(3,1fr)",
              gap:8,marginBottom:16
            }}>
              {[
                {l:"Estudiantes",v:estudiantes.length,c:C.azulC},
                {l:"Con notas",v:totalConNota,c:C.ok},
                {l:"Prom. grupal",v:promGrupal!=null?promGrupal:"—",
                  c:promGrupal>=3?C.ok:promGrupal!=null?C.err:C.textoS}
              ].map(s=>(
                <div key={s.l} style={{
                  background:C.tarjeta,border:"1px solid "+C.borde,
                  borderRadius:8,padding:"12px 14px",textAlign:"center"
                }}>
                  <p style={{
                    color:s.c,fontSize:24,fontWeight:"bold",
                    margin:"0 0 2px",fontFamily:FT
                  }}>{s.v}</p>
                  <p style={{color:C.textoS,fontSize:11,margin:0}}>{s.l}</p>
                </div>
              ))}
            </div>
            <div style={S.bloque}>
              <div style={{
                display:"flex",justifyContent:"space-between",
                alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8
              }}>
                <h2 style={S.tBloque}>
                  Notas - {periodo.actividades.length} actividades
                </h2>
                <input style={{...S.inp,maxWidth:220}}
                  placeholder="Buscar estudiante..."
                  value={busq}
                  onChange={e=>setBusq(e.target.value)}/>
              </div>
              {cargando ? (
                <p style={{color:C.textoS,textAlign:"center",padding:24}}>
                  Cargando estudiantes...
                </p>
              ) : estFiltrados.length===0 ? (
                <p style={{color:C.textoS,textAlign:"center",padding:24}}>
                  No hay estudiantes en grado {periodo.grado}.
                </p>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table style={{
                    width:"100%",borderCollapse:"collapse",fontSize:12
                  }}>
                    <thead>
                      <tr style={{background:"#0a1128"}}>
                        <th style={{
                          padding:"9px 10px",textAlign:"left",
                          color:C.azulC,borderBottom:"1px solid "+C.borde,
                          minWidth:160,position:"sticky",left:0,
                          background:"#0a1128"
                        }}>Estudiante</th>
                        {periodo.actividades.map((a,i)=>(
                          <th key={i} style={{
                            padding:"9px 10px",textAlign:"center",
                            color:C.verdeC,
                            borderBottom:"1px solid "+C.borde,
                            minWidth:100,fontSize:11
                          }}>{a}</th>
                        ))}
                        <th style={{
                          padding:"9px 10px",textAlign:"center",
                          color:C.naranja,
                          borderBottom:"1px solid "+C.borde,
                          minWidth:90
                        }}>Promedio</th>
                      </tr>
                    </thead>
                    <tbody>
                      {estFiltrados.map((est,i)=>{
                        const notasEst = notas[est.id]||{};
                        const prom = calcProm(notasEst);
                        return (
                          <tr key={est.id} style={{
                            background:i%2===0?"#0a1128":"#0d1528",
                            borderBottom:"1px solid "+C.borde
                          }}>
                            <td style={{
                              padding:"8px 10px",color:C.texto,
                              fontWeight:"bold",fontSize:12,
                              position:"sticky",left:0,
                              background:i%2===0?"#0a1128":"#0d1528"
                            }}>{est.name}</td>
                            {periodo.actividades.map((_,j)=>(
                              <td key={j} style={{
                                padding:"6px 8px",textAlign:"center"
                              }}>
                                <input style={{
                                  width:60,background:"#0f2a47",
                                  border:"1px solid "+C.borde,
                                  borderRadius:4,padding:"4px 6px",
                                  color:C.texto,textAlign:"center",
                                  fontSize:12,outline:"none"
                                }}
                                  type="number" min="0" max="5"
                                  step="0.1" placeholder="-"
                                  value={notasEst[j]||""}
                                  onChange={e=>{
                                    const v=e.target.value;
                                    setNotas(prev=>({
                                      ...prev,
                                      [est.id]:{...prev[est.id]||{},[j]:v}
                                    }));
                                  }}/>
                              </td>
                            ))}
                            <td style={{
                              padding:"8px 10px",textAlign:"center"
                            }}>
                              {prom!=null ? (
                                <span style={{
                                  color:prom>=3?C.ok:C.err,
                                  fontWeight:"bold",fontSize:15,
                                  fontFamily:FT
                                }}>{prom}</span>
                              ) : (
                                <span style={{color:"#374151"}}>—</span>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const savedUser = (()=>{
        try{return JSON.parse(localStorage.getItem("educlass_usuario")||"null");}
        catch{return null;}
      })();
      const savedToken = localStorage.getItem("edutoken");

      // Si no hay sesion, redirigir al login de EduPanel
      if (!savedUser || !savedToken) {
        window.location.href = "/edupanel/login.html";
        return null;
      }

      const [usuario, setUsuario] = useState(savedUser);
      const [periodos, setPeriodos] = useState([]);
      const [cargando, setCargando] = useState(false);
      const [showNuevo, setShowNuevo] = useState(false);
      const [periodoActivo, setPeriodoActivo] = useState(null);
      const [filtroGrado, setFiltroGrado] = useState("");
      const [filtroArea, setFiltroArea] = useState("");

      useEffect(()=>{
        if(usuario) cargarPeriodos();
      },[usuario]);

      const cargarPeriodos = async () => {
        setCargando(true);
        try {
          const r = await fetch(API+"/notas/periodos", {headers:authH()});
          const d = await r.json();
          setPeriodos(d.periodos||[]);
        } catch(_) {}
        setCargando(false);
      };

      const eliminarPeriodo = async (id) => {
        if(!confirm("Eliminar este periodo? Esta accion no se puede deshacer."))
          return;
        try {
          await fetch(API+"/notas/periodos/"+id, {
            method:"DELETE", headers:authH()
          });
          setPeriodos(ps=>ps.filter(p=>p.id!==id));
          if(periodoActivo?.id===id) setPeriodoActivo(null);
        } catch(_) { alert("Error al eliminar"); }
      };

      const salir = () => {
        localStorage.removeItem("edutoken");
        localStorage.removeItem("educlass_usuario");
        setUsuario(null);
        setPeriodos([]);
      };

      // No login needed - session handled by EduPanel

      if (periodoActivo) return (
        <VistaPeriodo
          periodo={periodoActivo}
          onVolver={()=>setPeriodoActivo(null)}
          onGuardado={p=>{
            setPeriodos(ps=>ps.map(x=>x.id===p.id?p:x));
            setPeriodoActivo(p);
          }}/>
      );

      const periodosFiltrados = periodos.filter(p=>{
        if(filtroGrado&&p.grado!==filtroGrado) return false;
        if(filtroArea&&p.area!==filtroArea) return false;
        return true;
      });

      return (
        <div style={S.fondo}>
          {showNuevo && (
            <ModalNuevoPeriodo
              onCerrar={()=>setShowNuevo(false)}
              onCreado={p=>{
                setPeriodos(ps=>[p,...ps]);
                setShowNuevo(false);
              }}/>
          )}
          <div style={S.header}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{
                color:C.azulC,fontSize:18,fontWeight:"bold",fontFamily:FT
              }}>📊 Libro de Notas</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{color:C.textoS,fontSize:12}}>
                {usuario.name}
              </span>
              <button style={{...S.btnSm,color:C.err,borderColor:C.rojo}}
                onClick={salir}>Salir</button>
            </div>
          </div>
          <div style={S.cont}>
            <div style={{
              display:"flex",justifyContent:"space-between",
              alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10
            }}>
              <div>
                <h2 style={{color:C.texto,fontSize:17,margin:0,fontFamily:FT}}>
                  Periodos de notas
                </h2>
                <p style={{color:C.textoS,fontSize:12,margin:"3px 0 0"}}>
                  {periodos.length} periodos creados
                </p>
              </div>
              <button style={{
                ...S.btnV,width:"auto",padding:"9px 18px"
              }} onClick={()=>setShowNuevo(true)}>
                + Nuevo periodo
              </button>
            </div>
            <div style={{
              display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"
            }}>
              <select style={{...S.sel,flex:"none",width:140}}
                value={filtroGrado}
                onChange={e=>setFiltroGrado(e.target.value)}>
                <option value="">Todos los grados</option>
                {GRADOS.map(g=><option key={g}>{g}</option>)}
              </select>
              <select style={{...S.sel,flex:"none",width:200}}
                value={filtroArea}
                onChange={e=>setFiltroArea(e.target.value)}>
                <option value="">Todas las areas</option>
                {AREAS.map(a=><option key={a}>{a}</option>)}
              </select>
              {(filtroGrado||filtroArea)&&(
                <button style={S.btnSm}
                  onClick={()=>{setFiltroGrado("");setFiltroArea("");}}>
                  Limpiar filtros
                </button>
              )}
            </div>
            {cargando ? (
              <div style={{...S.bloque,textAlign:"center",padding:40}}>
                <p style={{color:C.textoS,fontSize:13}}>Cargando periodos...</p>
              </div>
            ) : periodosFiltrados.length===0 ? (
              <div style={{...S.bloque,textAlign:"center",padding:40}}>
                <p style={{fontSize:44,margin:"0 0 12px"}}>📊</p>
                <p style={{color:C.textoS,fontSize:14,margin:"0 0 16px"}}>
                  {periodos.length===0
                    ?"No tienes periodos creados aun."
                    :"No hay periodos con esos filtros."}
                </p>
                {periodos.length===0&&(
                  <button style={{
                    ...S.btnV,width:"auto",padding:"10px 20px"
                  }} onClick={()=>setShowNuevo(true)}>
                    + Crear primer periodo
                  </button>
                )}
              </div>
            ) : (
              <div style={{
                display:"grid",
                gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",
                gap:10
              }}>
                {periodosFiltrados.map(p=>{
                  const conNota = Object.values(p.notas||{})
                    .filter(n=>Object.values(n).some(v=>v!=="")).length;
                  const promsV = Object.values(p.notas||{})
                    .map(n=>{
                      const vals=Object.values(n)
                        .map(v=>parseFloat(v)).filter(v=>!isNaN(v));
                      return vals.length
                        ?(vals.reduce((a,b)=>a+b,0)/vals.length):null;
                    }).filter(p=>p!==null);
                  const promG = promsV.length
                    ? parseFloat((promsV.reduce((a,b)=>a+b,0)/promsV.length).toFixed(2))
                    : null;
                  return (
                    <div key={p.id} style={{
                      background:C.tarjeta,
                      border:"1px solid "+C.borde,
                      borderRadius:10,padding:16,
                      display:"flex",flexDirection:"column",gap:10,
                      borderTop:"3px solid "+C.verde
                    }}>
                      <div>
                        <p style={{
                          color:C.verdeC,fontWeight:"bold",
                          margin:"0 0 4px",fontSize:14
                        }}>{p.nombre}</p>
                        <p style={{color:C.textoS,fontSize:12,margin:0}}>
                          {p.area}
                        </p>
                        <p style={{color:C.textoS,fontSize:11,margin:"2px 0 0"}}>
                          Grado {p.grado} - {p.porcentaje}% del ano
                        </p>
                      </div>
                      <div style={{
                        display:"flex",gap:8,
                        borderTop:"1px solid "+C.borde,paddingTop:10
                      }}>
                        <div style={{flex:1,textAlign:"center"}}>
                          <p style={{
                            color:C.azulC,fontSize:18,fontWeight:"bold",
                            margin:0,fontFamily:FT
                          }}>{p.actividades.length}</p>
                          <p style={{
                            color:C.textoS,fontSize:10,margin:0
                          }}>Actividades</p>
                        </div>
                        <div style={{flex:1,textAlign:"center"}}>
                          <p style={{
                            color:C.ok,fontSize:18,fontWeight:"bold",
                            margin:0,fontFamily:FT
                          }}>{conNota}</p>
                          <p style={{
                            color:C.textoS,fontSize:10,margin:0
                          }}>Con notas</p>
                        </div>
                        <div style={{flex:1,textAlign:"center"}}>
                          <p style={{
                            color:promG!=null?promG>=3?C.ok:C.err:C.textoS,
                            fontSize:18,fontWeight:"bold",
                            margin:0,fontFamily:FT
                          }}>{promG!=null?promG:"—"}</p>
                          <p style={{
                            color:C.textoS,fontSize:10,margin:0
                          }}>Prom. grupo</p>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button style={{
                          ...S.btnV,flex:1,padding:"8px 12px",fontSize:12
                        }} onClick={()=>setPeriodoActivo(p)}>
                          Ingresar notas
                        </button>
                        <button style={{
                          ...S.btnSm,color:C.err,borderColor:C.rojo,
                          padding:"8px 10px"
                        }} onClick={()=>eliminarPeriodo(p.id)}>X</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
