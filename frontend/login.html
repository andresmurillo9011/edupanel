<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPanel · I.E.R. Santiago de la Selva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(21,101,192,.22) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(46,125,50,.16) 0%, transparent 55%),
        linear-gradient(160deg, #060E08 0%, #0A1A0C 50%, #06100E 100%);
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ---- Encabezado ---- */
    .brand {
      text-align: center;
      padding-bottom: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .brand-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #F9A825;
      letter-spacing: .08em;
    }
    .brand-school {
      font-size: .92rem;
      font-weight: 600;
      color: #E8EEF8;
    }
    .brand-loc {
      font-size: .72rem;
      color: #7B9CC8;
    }
    .brand-line {
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, #1565C0, #2E7D32);
      border-radius: 3px;
      margin-top: 4px;
    }

    /* ---- Tarjeta ---- */
    .card {
      width: 100%;
      background: rgba(15,34,17,.95);
      border: 1px solid #1A3D1E;
      border-top: 3px solid #1565C0;
      border-radius: 20px;
      padding: 28px 26px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 22px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #E8EEF8;
      text-align: center;
      margin-bottom: 2px;
    }

    /* ---- Inputs ---- */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: .72rem; font-weight: 600; color: #7B9CC8; letter-spacing: .04em; }
    .field input {
      width: 100%;
      padding: 10px 14px;
      background: #142916;
      border: 1px solid #1A3D1E;
      border-radius: 40px;
      color: #E8EEF8;
      font-family: 'Sora', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: #1565C0;
      box-shadow: 0 0 0 3px rgba(21,101,192,.18);
    }
    .pass-row { position: relative; }
    .pass-row input { padding-right: 42px; }
    .eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: .95rem; color: #3A5580;
    }

    /* ---- Error ---- */
    .error {
      background: rgba(239,68,68,.12);
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: .76rem;
      color: #f87171;
      display: none;
    }

    /* ---- Botón ---- */
    .btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(90deg, #1565C0, #1976D2);
      border: none;
      border-radius: 40px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      box-shadow: 0 3px 12px rgba(21,101,192,.35);
      margin-top: 2px;
    }
    .btn:hover {
      background: linear-gradient(90deg, #0D47A1, #1565C0);
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(21,101,192,.5);
    }
    .btn:disabled {
      opacity: .6; cursor: not-allowed; transform: none;
    }

    /* ---- Nota de recuperación ---- */
    .recovery {
      display: flex; align-items: flex-start; gap: 9px;
      background: rgba(21,101,192,.08);
      border: 1px solid rgba(21,101,192,.2);
      border-radius: 10px;
      padding: 11px 13px;
    }
    .recovery p { font-size: .72rem; color: #7B9CC8; line-height: 1.6; }
    .recovery strong { color: #F9A825; }

    /* ---- Spinner ---- */
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      color: #66BB6A;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #1A3D1E;
      border-top-color: #43A047;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Footer con escudo ---- */
    .footer {
      display: flex; flex-direction: column; align-items: center;
      gap: 7px; opacity: .65;
    }
    .footer img {
      width: 52px; height: 52px;
      object-fit: contain;
    }
    .footer p {
      font-size: .62rem; color: #3A5580;
      text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Encabezado -->
    <div class="brand">
      <div class="brand-title">EduPanel</div>
      <div class="brand-school">I.E.R. Santiago de la Selva</div>
      <div class="brand-loc">Valparaíso · Caquetá · Colombia · 2026</div>
      <div class="brand-line"></div>
    </div>

    <!-- Formulario -->
    <div class="card">
      <div class="card-title">Acceso al Sistema Académico</div>

      <div class="field">
        <label>USUARIO</label>
        <input type="text" id="username" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>

      <div class="field">
        <label>CONTRASEÑA</label>
        <div class="pass-row">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye" type="button" onclick="togglePass()">👁</button>
        </div>
      </div>

      <div class="error" id="error"></div>
      <div class="loading" id="loading"><div class="spinner"></div> Verificando...</div>

      <button class="btn" id="login-btn" onclick="doLogin()">Ingresar →</button>

      <div class="recovery">
        <span>🔐</span>
        <p>¿Olvidaste tu contraseña?<br>
        Comunícate con el <strong>Administrador</strong> del sistema.</p>
      </div>
    </div>

    <!-- Escudo pequeño -->
    <div class="footer">
      <img src="escudo.png" alt="Escudo IESS">
      <p>Institución Educativa Rural<br>Santiago de la Selva · IESS</p>
    </div>

  </div>

  <!-- Scripts: data → auth → login logic -->
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script>
    // Si ya hay sesión activa, redirigir directamente
    (function() {
      const u = Auth.currentUser();
      if (u) window.location.href = u.role === "admin" ? "admin.html" : "horario.html";
    })();

    function togglePass() {
      const i = document.getElementById("password");
      i.type  = i.type === "password" ? "text" : "password";
    }

    function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("error");
      const loadEl   = document.getElementById("loading");
      const btn      = document.getElementById("login-btn");

      errEl.style.display = "none";
      if (!username || !password) {
        errEl.textContent   = "Ingresa tu usuario y contraseña";
        errEl.style.display = "block"; return;
      }

      loadEl.style.display = "flex";
      btn.disabled = true;

      // Pequeño delay para mostrar el spinner (localStorage es síncrono)
      setTimeout(() => {
        const result = Auth.login(username, password);
        loadEl.style.display = "none";
        btn.disabled = false;

        if (result.ok) {
          window.location.href = result.user.role === "admin" ? "admin.html" : "horario.html";
        } else {
          errEl.textContent   = result.message;
          errEl.style.display = "block";
          document.getElementById("password").value = "";
        }
      }, 300);
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
