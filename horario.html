<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario — I.E.R. Santiago de la Selva</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .avance-bar-wrap{height:5px;background:rgba(255,255,255,0.12);border-radius:99px;margin-top:4px;overflow:hidden;width:100%}
    .avance-bar-fill{height:100%;border-radius:99px;transition:width 0.4s}
    .pend-badge{display:inline-block;font-size:9px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.4);border-radius:4px;padding:1px 5px;margin-top:3px;letter-spacing:0.3px}
    .record-wrap{background:#0f1e35;border:1px solid #1e3a5f;border-radius:10px;padding:12px;margin-top:10px}
    .record-tipo-btn{padding:6px 14px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
    .record-tipo-btn.active{background:#1d4ed8;border-color:#3b82f6;color:#fff;font-weight:600}
    .record-set{color:#10b981;font-size:11px;margin:6px 0 0;font-weight:600}
  </style>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-left">
    <img src="escudo.png" alt="Escudo" class="header-logo">
    <div class="header-title">
      <span class="school-name">I.E.R. Santiago de la Selva</span>
      <span class="school-sub">Sistema de Horario Interactivo</span>
    </div>
  </div>
  <div class="header-center">
    <div class="clock-block">
      <span id="current-date"></span>
      <span id="current-time"></span>
    </div>
  </div>
  <div class="header-right">
    <a href="login.html" class="home-link-btn">🏠 Inicio</a>
    <a id="admin-link" href="admin.html" style="display:none" class="admin-link-btn">⚙ Admin</a>
    <a href="notas.html" class="admin-link-btn" style="background:rgba(5,150,105,.2);border-color:#059669;color:#34D399;">📊 Notas</a>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">--</div>
      <div class="user-details">
        <span id="user-name">Cargando...</span>
        <span id="user-role" class="user-role-badge">Docente</span>
      </div>
    </div>
    <button class="logout-btn">↩ Salir</button>
  </div>
</header>

<!-- VISTA TOGGLE -->
<div class="vista-bar">
  <button class="vista-btn active" onclick="setVista('completo',this)">🏫 Horario Completo</button>
  <button class="vista-btn" onclick="setVista('mio',this)">📋 Mi Horario</button>
</div>

<!-- NAVEGACIÓN DÍAS -->
<nav class="day-nav">
  <button class="day-btn active" data-day="Lunes">Lun</button>
  <button class="day-btn" data-day="Martes">Mar</button>
  <button class="day-btn" data-day="Miércoles">Mié</button>
  <button class="day-btn" data-day="Jueves">Jue</button>
  <button class="day-btn" data-day="Viernes">Vie</button>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<main class="main-layout">
  <!-- HORARIO -->
  <section class="schedule-section">
    <h2 class="schedule-title" id="schedule-title">🏫 Horario Completo · Lunes</h2>
    <div class="table-wrapper">
      <table class="schedule-table">
        <thead>
          <tr>
            <th class="th-hora">Hora</th>
            <th>Sexto</th>
            <th>Séptimo</th>
            <th>Octavo</th>
            <th>Noveno</th>
            <th>Décimo</th>
            <th>Once</th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </div>
  </section>

  <!-- PANEL LATERAL -->
  <aside class="side-panel">
    <div class="legend-bar" id="legend-bar" style="padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0"></div>
    <div id="panel-empty" class="panel-empty">
      <div class="panel-empty-icon">📋</div>
      <p>Selecciona una clase<br>para ver el detalle</p>
    </div>
    <div id="panel-content" class="panel-content" style="display:none"></div>
  </aside>
</main>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="data.js"></script>
<script src="db.js"></script>
<script>
// ============================================================
// APP.JS — Horario interactivo I.E.R. Santiago de la Selva
// Usa: DB (db.js) · HORARIO/MATERIAS (data.js)
// ============================================================

let selectedDay   = "Lunes";
let activeCell    = null;
let panelTab      = "diario";
let currentUser   = null;
let vistaMode     = "completo";
let guiaTerminadaVal = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener("DOMContentLoaded", async () => {

  // ── Verificar sesión con EduClass ──
  const tok = localStorage.getItem("edutoken");
  const raw = localStorage.getItem("educlass_usuario");

  // Si hay sesión de estudiante activa pero NO de docente → redirigir al portal
  const tokEst = localStorage.getItem("edutokenest");
  const rawEst = localStorage.getItem("educlass_estudiante");
  if (tokEst && rawEst && (!tok || !raw)) {
    window.location.href = "planeacion/index.html";
    return;
  }

  // Sin sesión docente → login
  if (!tok || !raw) {
    window.location.href = "login.html";
    return;
  }

  const eduUser = JSON.parse(raw);

  // Verificar que sea docente (los docentes tienen email, los estudiantes no)
  if (!eduUser || !eduUser.email) {
    localStorage.removeItem("edutoken");
    localStorage.removeItem("educlass_usuario");
    window.location.href = "login.html";
    return;
  }

  // Leer asignaciones desde backend EduClass
  let asignacionesDocente = [];
  let gradosDocente = [];
  let materiasDocente = [];
  try {
    const rAsig = await fetch(`https://educlass-backend-4kk0.onrender.com/asignaciones/${eduUser.id}`, {
      headers: { "Authorization": `Bearer ${tok}` }
    });
    if (rAsig.ok) {
      const dAsig = await rAsig.json();
      asignacionesDocente = dAsig.asignaciones || [];
      gradosDocente       = [...new Set(asignacionesDocente.map(a => a.grado))];
      materiasDocente     = [...new Set(asignacionesDocente.map(a => a.area))];
    }
  } catch(_) {
    // Fallback: leer desde localStorage del admin
    try {
      const epUsers = JSON.parse(localStorage.getItem("edupanel_users") || "[]");
      const epUser  = epUsers.find(u => u.email === eduUser.email);
      if (epUser) {
        asignacionesDocente = epUser.asignaciones || [];
        gradosDocente       = epUser.grados       || [];
        materiasDocente     = epUser.materias      || [];
      }
    } catch(__) {}
  }

  currentUser = {
    id:           eduUser.id,
    name:         eduUser.name,
    role:         eduUser.rol || eduUser.cargo || "docente",
    email:        eduUser.email,
    asignaciones: asignacionesDocente,
    grados:       gradosDocente,
    materias:     materiasDocente,
  };

  // Header
  const initials = currentUser.name.split(" ").map(n => n[0]).join("").substring(0, 2).toUpperCase();
  document.getElementById("user-avatar").textContent  = initials;
  document.getElementById("user-name").textContent    = currentUser.name;
  document.getElementById("user-role").textContent    =
    currentUser.role === "admin" ? "👑 Administrador" : "👤 Docente";

  // Logout limpio
  const logoutBtn = document.querySelector(".logout-btn");
  if (logoutBtn) {
    logoutBtn.onclick = () => {
      localStorage.removeItem("edutoken");
      localStorage.removeItem("educlass_usuario");
      window.location.href = "login.html";
    };
  }

  if (currentUser.role === "admin" || currentUser.role === "superadmin") {
    const adminLink = document.getElementById("admin-link");
    if (adminLink) adminLink.style.display = "inline-flex";
  }

  initClock();
  initDayNav();
  await renderSchedule(selectedDay);
  renderLegend();
  setTimeout(checkRecordatorios, 1500);
});

// ============================================================
// VISTA TOGGLE
// ============================================================
function setVista(mode, btn) {
  vistaMode = mode;
  document.querySelectorAll(".vista-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  document.getElementById("schedule-title").textContent =
    mode === "mio" ? "📋 Mi Horario" : `🏫 Horario Completo · ${selectedDay}`;
  renderSchedule(selectedDay);
  resetPanel();
}

// ============================================================
// RELOJ
// ============================================================
function initClock() {
  const dateEl = document.getElementById("current-date");
  const timeEl = document.getElementById("current-time");
  const days   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  function update() {
    const n = new Date();
    dateEl.textContent = `${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]}`;
    timeEl.textContent = n.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  }
  update(); setInterval(update, 1000);
}

// ============================================================
// NAVEGACIÓN DÍAS
// ============================================================
function initDayNav() {
  document.querySelectorAll(".day-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedDay = btn.dataset.day;
      if (vistaMode === "completo")
        document.getElementById("schedule-title").textContent = `🏫 Horario Completo · ${selectedDay}`;
      renderSchedule(selectedDay);
      resetPanel();
    });
  });
}

function resetPanel() {
  activeCell = null;
  document.getElementById("panel-empty").style.display  = "flex";
  document.getElementById("panel-content").style.display = "none";
  document.querySelectorAll(".class-cell.selected").forEach(td => td.classList.remove("selected"));
}

// ============================================================
// RENDERIZAR HORARIO
// ============================================================
async function renderSchedule(day) {
  const tbody = document.getElementById("schedule-body");
  tbody.innerHTML = "";
  const filas = HORARIO[day] || [];

  // Precargar diarios para mostrar dots (en paralelo)
  const cache = {};
  await Promise.all(
    filas.flatMap(fila => {
      if (["DESCANSO","ALMUERZO"].includes(fila.sexto)) return [];
      return GRADOS.map(grado => {
        const m = fila[grado];
        if (!m || !MATERIAS_CONFIG[m] || ["DESCANSO","ALMUERZO"].includes(m)) return null;
        return DB.getDiario(day, grado, fila.hora, m)
          .then(d => { cache[`${grado}::${fila.hora}::${m}`] = d; })
          .catch(() => {});
      }).filter(Boolean);
    })
  );

  filas.forEach((fila, rowIndex) => {
    const tr = document.createElement("tr");
    const isDescanso = fila.sexto === "DESCANSO";
    const isAlmuerzo = fila.sexto === "ALMUERZO";

    if (isDescanso || isAlmuerzo) {
      const td = document.createElement("td");
      td.colSpan = 7; td.className = "break-cell";
      const cfg = MATERIAS_CONFIG[isDescanso ? "DESCANSO" : "ALMUERZO"];
      td.style.setProperty("--break-color", cfg.color);
      td.innerHTML = `<span>${cfg.icon}</span> ${isDescanso?"Descanso":"Almuerzo"} <span class="break-time">${fila.hora}</span>`;
      tr.classList.add("break-row");
      tr.appendChild(td); tbody.appendChild(tr); return;
    }

    // Celda de hora
    const tdH = document.createElement("td");
    tdH.className = "td-hora";
    tdH.innerHTML = `<span class="hora-num">${rowIndex+1}</span><span class="hora-text">${fila.hora}</span>`;
    tr.appendChild(tdH);

    GRADOS.forEach(grado => {
      const materia = fila[grado] || "";
      const td  = document.createElement("td");
      const cfg = MATERIAS_CONFIG[materia];
      if (materia && cfg && !["DESCANSO","ALMUERZO"].includes(materia)) {
        const tieneAsignaciones = currentUser.asignaciones && currentUser.asignaciones.length > 0;
        const esMiHorario = vistaMode === "mio";
        const normalizar = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[°\s]/g,"");
        // Mapa para convertir claves internas a número de grado
        const GRADO_NUM = {sexto:"6",septimo:"7",octavo:"8",noveno:"9",decimo:"10",once:"11"};
        const gradoNum = GRADO_NUM[grado] || normalizar(grado);
        const normGrado = a => {
          const n = normalizar(a);
          // convierte "11°" → "11", "once" → "11", "decimo" → "10", etc.
          const fromNum = {sexto:"6",septimo:"7",octavo:"8",noveno:"9",decimo:"10",once:"11"};
          return fromNum[n] || n.replace(/[a-z]/g, c => ({s:"6",e:"7",o:"8",n:"9",d:"10"}[c]||c)) || n;
        };
        const esMiMateria = !tieneAsignaciones || !esMiHorario ||
          currentUser.asignaciones.some(a => {
            const gradoOk = normGrado(a.grado) === gradoNum;
            const areaN = normalizar(a.area);
            const materiaFull = normalizar(materia);
            // Comparación exacta o por inicio (ej: "tecnologia" == "tecnologiaeinformatica"[:10])
            const areaOk = areaN === materiaFull ||
              areaN.startsWith(materiaFull) ||
              materiaFull.startsWith(areaN) ||
              areaN.replace(/einformatica|einfo/g,"") === materiaFull ||
              materiaFull.replace(/einformatica|einfo/g,"") === areaN;
            return gradoOk && areaOk;
          });

        if (!esMiMateria) {
          td.className = "empty-cell locked-cell"; td.innerHTML = "—";
          tr.appendChild(td); return;
        }

        td.className = "class-cell";
        td.style.setProperty("--cell-color", cfg.color);
        td.setAttribute("data-dia",   day);
        td.setAttribute("data-hora",  fila.hora);
        td.setAttribute("data-grado", grado);
        const cached = cache[`${grado}::${fila.hora}::${materia}`];
        // Si es parte de un bloque, usar datos de cualquier hora del bloque que tenga info
        let cachedEfectivo = cached;
        if (!cachedEfectivo?.temaVisto && fila.num) {
          const horasB = getHorasDelBloque(day, grado, fila.num);
          for (const numH of horasB) {
            const filaH = filas.find(f => f.num === numH);
            if (filaH) {
              const c2 = cache[`${grado}::${filaH.hora}::${materia}`];
              if (c2?.temaVisto) { cachedEfectivo = c2; break; }
            }
          }
        }
        const hasDot = cachedEfectivo && cachedEfectivo.temaVisto;
        const avance = cachedEfectivo?.avancePorcentaje ?? null;
        const hasPend = cachedEfectivo?.guiaTerminada === false;
        const avanceColor = avance >= 80 ? "#10b981" : avance >= 40 ? "#f59e0b" : "#ef4444";
        const esBloqueNum = fila.num ? getHorasDelBloque(day, grado, fila.num).length > 1 : false;
        td.innerHTML = `
          <span class="cell-icon">${cfg.icon}</span>
          <span class="cell-materia">${materia}</span>
          ${esBloqueNum ? `<span style="font-size:8px;color:#3b82f6;letter-spacing:0.3px">🔗 bloque</span>` : ""}
          ${hasDot && avance !== null ? `
            <div class="avance-bar-wrap" title="Avance: ${avance}%">
              <div class="avance-bar-fill" style="width:${avance}%;background:${avanceColor}"></div>
            </div>
            ${hasPend ? `<span class="pend-badge">⚠ Pendiente</span>` : ""}
          ` : ""}
        `;
        td.addEventListener("click", () => onCellClick(td, day, fila.hora, grado, materia));
      } else {
        td.className = "empty-cell"; td.innerHTML = "—";
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

// ============================================================
// CLICK EN CELDA
// ============================================================
async function onCellClick(td, dia, hora, grado, materia) {
  document.querySelectorAll(".class-cell.selected").forEach(el => el.classList.remove("selected"));
  td.classList.add("selected");
  activeCell = { dia, hora, grado, materia };
  document.getElementById("panel-empty").style.display  = "none";
  document.getElementById("panel-content").style.display = "flex";
  panelTab = "diario";
  await renderPanel(dia, hora, grado, materia);
}

// ============================================================
// PANEL LATERAL
// ============================================================
async function renderPanel(dia, hora, grado, materia) {
  const panel = document.getElementById("panel-content");
  const cfg   = MATERIAS_CONFIG[materia];
  panel.innerHTML = `
    <div class="panel-header" style="--ph-color:${cfg.color}">
      <div class="panel-badge">
        <span class="panel-icon">${cfg.icon}</span>
        <div class="panel-title-block">
          <h3 class="panel-materia">${materia}</h3>
          <span class="panel-meta">${GRADOS_LABEL[grado]} · ${dia} · ${hora}</span>
        </div>
      </div>
      <button class="close-btn" onclick="resetPanel()">✕</button>
    </div>
    <div class="panel-tabs">
      <button class="tab-btn active" onclick="switchTab('diario',this)">📋 Diario</button>
      <button class="tab-btn" onclick="switchTab('seguimiento',this)">📊 Seguimiento</button>
      <button class="tab-btn" onclick="switchTab('notas',this)">📝 Notas</button>
      <button class="tab-btn" onclick="switchTab('plan',this)">🗓 Plan</button>
    </div>
    <div class="tab-content" id="tab-content">
      <div style="padding:24px;text-align:center;color:#3A5580">Cargando...</div>
    </div>`;
  await loadTab("diario", dia, hora, grado, materia);
}

async function switchTab(tab, btn) {
  panelTab = tab;
  if (!activeCell) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  const { dia, hora, grado, materia } = activeCell;
  document.getElementById("tab-content").innerHTML =
    `<div style="padding:24px;text-align:center;color:#3A5580">Cargando...</div>`;
  await loadTab(tab, dia, hora, grado, materia);
}

async function loadTab(tab, dia, hora, grado, materia) {
  const cont = document.getElementById("tab-content");
  try {
    let html = "";
    if (tab === "diario")       html = await renderDiario(dia, hora, grado, materia);
    if (tab === "seguimiento")  html = await renderSeguimiento(dia, hora, grado, materia);
    if (tab === "notas")        html = await renderNotas(dia, hora, grado, materia);
    if (tab === "plan")         html = await renderPlan(dia, hora, grado, materia);
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="tab-panel"><div class="empty-state">Error cargando datos.</div></div>`;
    console.error(e);
  }
}

// ============================================================
// TAB: DIARIO
// ============================================================
async function renderDiario(dia, hora, grado, materia) {
  const d = await DB.getDiario(dia, grado, hora, materia);
  guiaTerminadaVal = d.guiaTerminada;
  recTipoVal = d.recordatorio?.tipo || "auto";

  // Detectar si es parte de un bloque
  const filas = HORARIO[dia] || [];
  const filaActual = filas.find(f => f.hora === hora && f[grado] === materia);
  const numActual = filaActual?.num;
  const horasBloque = numActual ? getHorasDelBloque(dia, grado, numActual) : [];
  const esBloqueHTML = horasBloque.length > 1
    ? `<div style="background:#1e3a5f;border:1px solid #3b82f6;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#93c5fd">
        🔗 Bloque de ${horasBloque.length} horas — al guardar se actualizan ambas horas automáticamente
       </div>`
    : "";

  return `
    <div class="tab-panel">
      ${esBloqueHTML}
      <div class="info-badges">
        <div class="info-badge"><span class="ib-label">Día</span><span class="ib-value">${dia}</span></div>
        <div class="info-badge"><span class="ib-label">Grado</span><span class="ib-value">${GRADOS_LABEL[grado]}</span></div>
        <div class="info-badge"><span class="ib-label">Hora</span><span class="ib-value">${hora.split(" ")[0]}</span></div>
        <div class="info-badge"><span class="ib-label">Docente</span><span class="ib-value" style="font-size:.68rem">${currentUser.name.split(" ")[0]}</span></div>
      </div>
      <div class="form-group">
        <label class="form-label">Tema visto hoy</label>
        <input class="form-input" id="tema-visto" type="text" placeholder="Ej: Ecuaciones de primer grado..." value="${d.temaVisto||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción / desarrollo de la clase</label>
        <textarea class="form-textarea" id="descripcion" placeholder="¿Qué se hizo? ¿Cómo respondió el grupo? ¿Hasta dónde llegamos?">${d.descripcion||''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Observación general del día</label>
        <textarea class="form-textarea" id="obs-general" placeholder="Comportamiento, novedades, ambiente de la clase...">${d.observacionGeneral||''}</textarea>
      </div>
      <div class="form-check-group">
        <label class="form-check-label">¿Se terminó la guía / actividad?</label>
        <div class="toggle-options">
          <button class="toggle-opt ${d.guiaTerminada===true?'active':''}" id="guia-si" onclick="setGuia(true)">✓ Completo</button>
          <button class="toggle-opt ${d.guiaTerminada===false?'active':''}" id="guia-no" onclick="setGuia(false)">✗ Pendiente</button>
        </div>
      </div>
      <div id="pendiente-wrap" style="display:${d.guiaTerminada===false?'block':'none'}">
        <div class="form-group">
          <label class="form-label">¿Qué quedó pendiente? / ¿Hasta dónde llegamos?</label>
          <input class="form-input" id="guia-pendiente" type="text" placeholder="Ej: Ejercicios 3-6, página 45" value="${d.guiaPendiente||''}">
        </div>
        <div class="record-wrap">
          <label class="form-label" style="margin-bottom:8px;display:block">🔔 Recordatorio del pendiente</label>
          <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
            <button class="record-tipo-btn ${(!d.recordatorio||d.recordatorio.tipo==='auto')?'active':''}" id="rec-auto" onclick="setRecTipo('auto')">⚡ Auto (2 días antes)</button>
            <button class="record-tipo-btn ${d.recordatorio?.tipo==='manual'?'active':''}" id="rec-manual" onclick="setRecTipo('manual')">📅 Fecha manual</button>
            <button class="record-tipo-btn ${d.recordatorio?.tipo==='ninguno'?'active':''}" id="rec-ninguno" onclick="setRecTipo('ninguno')">✗ Sin recordatorio</button>
          </div>
          <div id="rec-fecha-wrap" style="display:${d.recordatorio?.tipo==='manual'?'block':'none'}">
            <input class="form-input" type="date" id="rec-fecha" value="${d.recordatorio?.fecha||''}" style="max-width:200px">
          </div>

async function saveDiario() {
  if (!activeCell) return;
  const { dia, hora, grado, materia } = activeCell;

  // Detectar bloque
  const filas = HORARIO[dia] || [];
  const filaActual = filas.find(f => f.hora === hora && f[grado] === materia);
  const numActual = filaActual?.num;
  const horasBloque = numActual ? getHorasDelBloque(dia, grado, numActual) : [];

  const existing = await DB.getDiario(dia, grado, hora, materia);

  // Recordatorio
  const DIAS_SEM = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  const diaIdx = DIAS_SEM.indexOf(dia);
  let recordatorio = existing.recordatorio || null;
  if (guiaTerminadaVal === false) {
    const tipo = recTipoVal || existing.recordatorio?.tipo || "auto";
    if (tipo === "auto") {
      const hoy = new Date();
      const difDias = ((diaIdx - hoy.getDay() + 5) % 7) || 7;
      const fechaClase = new Date(hoy); fechaClase.setDate(hoy.getDate() + difDias);
      const fechaRec = new Date(fechaClase); fechaRec.setDate(fechaClase.getDate() - 2);
      recordatorio = { tipo:"auto", fecha: fechaRec.toISOString().split("T")[0], texto: `Pendiente en ${materia} ${GRADOS_LABEL[grado]}: ${document.getElementById("guia-pendiente")?.value||""}` };
    } else if (tipo === "manual") {
      recordatorio = { tipo:"manual", fecha: document.getElementById("rec-fecha")?.value||"", texto: `Pendiente en ${materia} ${GRADOS_LABEL[grado]}: ${document.getElementById("guia-pendiente")?.value||""}` };
    } else {
      recordatorio = { tipo:"ninguno" };
    }
  } else { recordatorio = null; }

  const datos = {
    ...existing,
    temaVisto:          document.getElementById("tema-visto")?.value    || "",
    descripcion:        document.getElementById("descripcion")?.value   || "",
    observacionGeneral: document.getElementById("obs-general")?.value   || "",
    guiaTerminada:      guiaTerminadaVal,
    guiaPendiente:      document.getElementById("guia-pendiente")?.value || "",
    avancePorcentaje:   parseInt(document.getElementById("avance-range")?.value || 50),
    recordatorio,
  };

  await DB.saveDiario(dia, grado, hora, materia, datos, currentUser.id);

  // Propagar a hora gemela del bloque
  if (horasBloque.length > 1) {
    for (const numH of horasBloque) {
      const filaH = filas.find(f => f.num === numH && f[grado] === materia);
      if (filaH && filaH.hora !== hora) {
        const existH = await DB.getDiario(dia, grado, filaH.hora, materia);
        await DB.saveDiario(dia, grado, filaH.hora, materia, { ...existH, ...datos }, currentUser.id);
      }
    }
    showToast(`✓ Guardado · bloque de ${horasBloque.length} horas actualizado`);
  } else {
    showToast("✓ Diario guardado");
  }

  checkRecordatorios();
  await renderSchedule(dia);
  setTimeout(() => {
    document.querySelectorAll(".class-cell").forEach(td => {
      if (td.dataset.dia===dia && td.dataset.hora===hora && td.dataset.grado===grado)
        td.classList.add("selected");
    });
  }, 60);
}

  document.getElementById("guia-no").classList.toggle("active", v === false);
  document.getElementById("pendiente-wrap").style.display = v === false ? "block" : "none";

  ["auto","manual","ninguno"].forEach(t => {
    const btn = document.getElementById(`rec-${t}`);
    if(btn) btn.classList.toggle("active", t===tipo);

async function checkRecordatorios() {
  try {
    const hoy = new Date().toISOString().split("T")[0];
    const alertas = [];
    for (const dia of Object.keys(HORARIO)) {
      for (const fila of HORARIO[dia]) {
        if (fila.tipo) continue;
        for (const grado of GRADOS) {
          const mat = fila[grado]; if (!mat) continue;
          try {
            const d = await DB.getDiario(dia, grado, fila.hora, mat);
            if (d?.recordatorio?.fecha && d.recordatorio.tipo !== "ninguno" && d.recordatorio.fecha <= hoy) {
              alertas.push({ dia, grado, mat, hora: fila.hora, rec: d.recordatorio });
            }
          } catch(_) {}
        }
      }
    }
    if (alertas.length > 0) mostrarAlertasRecordatorio(alertas);
  } catch(_) {}
}

function mostrarAlertasRecordatorio(alertas) {
  const existing = document.getElementById("rec-toast-panel");
  if (existing) existing.remove();
  const panel = document.createElement("div");
  panel.id = "rec-toast-panel";
  panel.style.cssText = "position:fixed;bottom:20px;right:20px;z-index:9999;max-width:320px;display:flex;flex-direction:column;gap:8px";
  alertas.slice(0,5).forEach(a => {
    const el = document.createElement("div");
    el.style.cssText = "background:#1e1b4b;border:1px solid #fbbf24;border-radius:10px;padding:12px 14px;box-shadow:0 4px 20px rgba(0,0,0,0.5)";
    el.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div>
        <p style="color:#fbbf24;font-weight:700;font-size:13px;margin:0 0 4px">🔔 Pendiente por resolver</p>
        <p style="color:#e2e8f0;font-size:12px;margin:0 0 2px">${a.rec.texto||'Pendiente sin descripción'}</p>
        <p style="color:#94a3b8;font-size:10px;margin:0">📅 ${a.rec.fecha} · ${a.dia} ${GRADOS_LABEL[a.grado]}</p>

    </div>`;
    panel.appendChild(el);
  });
  document.body.appendChild(panel);
}

// ── Visor de PDF ──────────────────────────────────────────
let _pdfDoc = null;
let _pdfPagActual = 1;
let _pdfData = null; // base64

async function cargarArchivoClase(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith(".pdf")) {
    showToast("⚠ Solo se soportan archivos PDF por ahora");
    return;
  }
  const reader = new FileReader();
  reader.onload = async (e) => {
    _pdfData = e.target.result;
    // Guardar nombre en marcador
    if (activeCell) {
      const { dia, hora, grado, materia } = activeCell;
      const existing = await DB.getDiario(dia, grado, hora, materia);
      const pagGuardada = existing.marcadorClase?.pagina || 1;
      await DB.saveDiario(dia, grado, hora, materia, {
        ...existing,
        marcadorClase: { ...existing.marcadorClase, archivo: file.name, pagina: pagGuardada }
      }, currentUser.id);
    }
    await abrirVisorClase();
  };
  reader.readAsDataURL(file);
}

async function abrirVisorClase() {
  if (!_pdfData && !window._pdfDataGlobal) { showToast("⚠ Primero sube un PDF"); return; }
  const data = _pdfData || window._pdfDataGlobal;
  
  // Cargar PDF.js si no está
  if (!window.pdfjsLib) {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }

  const pdfBytes = Uint8Array.from(atob(data.split(",")[1]), c => c.charCodeAt(0));
  _pdfDoc = await window.pdfjsLib.getDocument({ data: pdfBytes }).promise;

  // Ir a la página marcada
  if (activeCell) {
    const { dia, hora, grado, materia } = activeCell;
    const d = await DB.getDiario(dia, grado, hora, materia);
    _pdfPagActual = d.marcadorClase?.pagina || 1;
  }

  document.getElementById("visor-clase-wrap").style.display = "block";
  await renderPaginaPDF(_pdfPagActual);
}

async function renderPaginaPDF(numPag) {
  if (!_pdfDoc) return;
  numPag = Math.max(1, Math.min(numPag, _pdfDoc.numPages));
  _pdfPagActual = numPag;
  document.getElementById("visor-pagina-actual").textContent = `${numPag} / ${_pdfDoc.numPages}`;
  document.getElementById("marcador-pagina").value = numPag;

  const page = await _pdfDoc.getPage(numPag);
  const canvas = document.getElementById("visor-canvas");
  const ctx = canvas.getContext("2d");
  const panelW = canvas.parentElement.offsetWidth || 600;
  const viewport = page.getViewport({ scale: panelW / page.getViewport({scale:1}).width });
  canvas.height = viewport.height;
  canvas.width  = viewport.width;
  await page.render({ canvasContext: ctx, viewport }).promise;
}

async function cambiarPaginaVisor(delta) {
  await renderPaginaPDF(_pdfPagActual + delta);
}

async function marcarPaginaActual() {
  document.getElementById("marcador-pagina").value = _pdfPagActual;
  showToast(`📌 Página ${_pdfPagActual} marcada`);
}

function cerrarVisor() {
  document.getElementById("visor-clase-wrap").style.display = "none";
}

    csv += `${est.numero},"${est.nombre}","${ESTADOS_CLASE[n.estado||"normal"]?.label||"Normal"}","${n.nota||''}","${n.observacion||''}"\n`;
  });
  const a = document.createElement("a");
  a.href     = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = `notas_${grado}_${materia.replace(/\s+/g,"_")}_${dia}.csv`;
  a.click();
}

// ============================================================
// TAB: PLAN
// ============================================================
async function renderPlan(dia, hora, grado, materia) {
  const d = await DB.getDiario(dia, grado, hora, materia);
  return `
    <div class="tab-panel">
      <div class="form-group">
        <label class="form-label">🎯 Objetivo de la clase</label>
        <textarea class="form-textarea" id="plan-objetivo" placeholder="¿Qué aprenderán los estudiantes hoy?">${d.planObjetivo||''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">📚 Recursos y materiales</label>
        <textarea class="form-textarea" id="plan-recursos" placeholder="Libro, fotocopias, videos, laboratorio...">${d.planRecursos||''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">📝 Actividades planificadas</label>
        <textarea class="form-textarea" id="plan-actividades" placeholder="Secuencia de actividades de la clase...">${d.planActividades||''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">📊 Criterios de evaluación</label>
        <textarea class="form-textarea" id="plan-evaluacion" placeholder="¿Cómo vas a evaluar el aprendizaje?">${d.planEvaluacion||''}</textarea>
      </div>
      <button class="save-btn" onclick="savePlan()">💾 Guardar plan</button>
    </div>`;
}

async function savePlan() {
  if (!activeCell) return;
  const { dia, hora, grado, materia } = activeCell;
  const existing = await DB.getDiario(dia, grado, hora, materia);
  await DB.saveDiario(dia, grado, hora, materia, {
    ...existing,
    planObjetivo:   document.getElementById("plan-objetivo")?.value    || "",
    planRecursos:   document.getElementById("plan-recursos")?.value    || "",
    planActividades:document.getElementById("plan-actividades")?.value || "",
    planEvaluacion: document.getElementById("plan-evaluacion")?.value  || "",
  }, currentUser.id);
  showToast("✓ Plan guardado");
}

// ============================================================
// LEYENDA
// ============================================================
function renderLegend() {
  const bar = document.getElementById("legend-bar");
  if (!bar || !MATERIAS_CONFIG) return;
  bar.innerHTML = Object.entries(MATERIAS_CONFIG)
    .filter(([k]) => !["DESCANSO","ALMUERZO"].includes(k))
    .map(([k, v]) => `<span class="legend-item" style="--lc:${v.color}">${v.icon} ${k}</span>`)
    .join("");
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 2200);
}
</script>
