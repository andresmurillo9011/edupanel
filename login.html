<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPanel · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-brand">
      <span class="login-logo-icon">⬡</span>
      <span class="login-logo-text">EduPanel</span>
      <p class="login-tagline">Plataforma de gestión académica docente</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">Iniciar sesión</h2>

      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="login-user" type="text" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="pass-wrap">
          <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye-btn" onclick="togglePass()">👁</button>
        </div>
      </div>

      <div class="login-error" id="login-error" style="display:none"></div>

      <button class="login-btn" onclick="doLogin()">Entrar →</button>

      <div class="recovery-note">
        <span class="recovery-icon">🔐</span>
        <p>¿Olvidaste tu contraseña o no tienes usuario?<br>
        Comunícate con el <strong>administrador del sistema</strong> para recuperar o crear tu acceso.</p>
      </div>
    </div>

    <p class="login-footer">I.E.R. Santiago de la Selva · Valparaíso, Caquetá · 2026</p>
  </div>

  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script>
    // Si ya hay sesión activa → redirigir
    if (Auth.currentUser()) window.location.href = "index.html";

    function doLogin() {
      const user = document.getElementById("login-user").value.trim();
      const pass = document.getElementById("login-pass").value;
      const result = Auth.login(user, pass);
      if (result.ok) {
        window.location.href = result.user.role === "admin" ? "admin.html" : "index.html";
      } else {
        const err = document.getElementById("login-error");
        err.textContent = result.message;
        err.style.display = "block";
      }
    }

    function fillDemo(u, p) {
      document.getElementById("login-user").value = u;
      document.getElementById("login-pass").value = p;
    }

    function togglePass() {
      const inp = document.getElementById("login-pass");
      inp.type = inp.type === "password" ? "text" : "password";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
