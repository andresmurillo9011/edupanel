<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPanel · I.E.R. Santiago de la Selva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-body { background: radial-gradient(ellipse at 20% 30%, rgba(21,101,192,.18), transparent 55%), radial-gradient(ellipse at 80% 70%, rgba(46,125,50,.12), transparent 55%), #060E08; }
    .login-wrap { display:flex; flex-direction:column; align-items:center; gap:0; width:100%; max-width:400px; }
    .login-header-text { text-align:center; padding:0 0 20px; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .login-iess-title  { font-size:1.4rem; font-weight:800; color:#F9A825; letter-spacing:.1em; }
    .login-school-name-sm { font-size:.88rem; font-weight:600; color:#E8EEF8; }
    .login-school-sub-sm  { font-size:.7rem; color:#7B9CC8; }
    .login-divider { width:48px; height:2px; background:linear-gradient(90deg,#1565C0,#2E7D32); border-radius:2px; margin:6px auto 0; }
    .login-card { border-top:3px solid #1565C0; margin-bottom:24px; }
    .login-bottom-brand { display:flex; flex-direction:column; align-items:center; gap:6px; opacity:.7; }
    .login-escudo-small { width:52px; height:52px; object-fit:contain; }
    .login-footer-text { font-size:.62rem; color:#3A5580; text-align:center; line-height:1.5; }
    .login-loading { display:flex; align-items:center; gap:8px; font-size:.78rem; color:#66BB6A; }
    .spinner { width:14px; height:14px; border:2px solid #1A3D1E; border-top-color:#43A047; border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-header-text">
      <div class="login-iess-title">EduPanel</div>
      <div class="login-school-name-sm">I.E.R. Santiago de la Selva</div>
      <div class="login-school-sub-sm">Valparaíso · Caquetá · Colombia · 2026</div>
      <div class="login-divider"></div>
    </div>

    <div class="login-card">
      <h2 class="login-title">Acceso al Sistema Académico</h2>
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="login-user" type="text" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="pass-wrap">
          <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye-btn" onclick="togglePass()" type="button">👁</button>
        </div>
      </div>
      <div class="login-error"   id="login-error"   style="display:none"></div>
      <div class="login-loading" id="login-loading" style="display:none"><div class="spinner"></div> Conectando...</div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar al sistema →</button>
      <div class="recovery-note">
        <span class="recovery-icon">🔐</span>
        <p>¿Olvidaste tu contraseña? Comunícate con el <strong>Administrador</strong> del sistema.</p>
      </div>
    </div>

    <div class="login-bottom-brand">
      <img src="escudo.png" alt="Escudo IESS" class="login-escudo-small">
      <div class="login-footer-text">Institución Educativa Rural<br>Santiago de la Selva · IESS</div>
    </div>
  </div>

  <script src="data.js"></script>
  <script type="module" src="firebase.js"></script>
  <script>
    function togglePass() {
      const i = document.getElementById("login-pass");
      i.type  = i.type === "password" ? "text" : "password";
    }

    async function waitForFirebase(ms = 8000) {
      const t = Date.now();
      while (!window.FireAuth) {
        if (Date.now() - t > ms) return false;
        await new Promise(r => setTimeout(r, 150));
      }
      return true;
    }

    async function doLogin() {
      const user  = document.getElementById("login-user").value.trim();
      const pass  = document.getElementById("login-pass").value;
      const errEl = document.getElementById("login-error");
      const loadEl= document.getElementById("login-loading");
      const btn   = document.getElementById("login-btn");
      errEl.style.display = "none";
      if (!user || !pass) { errEl.textContent="Ingresa tu usuario y contraseña"; errEl.style.display="block"; return; }
      loadEl.style.display = "flex"; btn.disabled = true;
      const ready = await waitForFirebase();
      if (!ready) {
        errEl.textContent = "Sin conexión a internet. Verifica tu red.";
        errEl.style.display="block"; loadEl.style.display="none"; btn.disabled=false; return;
      }
      try {
        const r = await window.FireAuth.login(user, pass);
        if (r.ok) {
          window.location.href = r.user.role === "admin" ? "admin.html" : "index.html";
        } else {
          errEl.textContent = r.message; errEl.style.display="block";
          document.getElementById("login-pass").value = "";
        }
      } catch(e) {
        errEl.textContent="Error de conexión. Intenta de nuevo."; errEl.style.display="block"; console.error(e);
      } finally { loadEl.style.display="none"; btn.disabled=false; }
    }
    document.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
  </script>
</body>
</html>
